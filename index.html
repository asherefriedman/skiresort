<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🏔️ Ski Resort Tycoon</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="style.css">
  <script src="game.js" defer></script>
</head>
<body>

  <!-- Home Screen -->
  <div id="home-screen" class="screen">
    <h1>🏔️ Ski Resort Tycoon</h1>
    <div class="buttons">
      <!-- Google Sign-In -->
      <div id="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="filled_blue"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"
           data-callback="handleCredentialResponse"
           data-client_id="YOUR_GOOGLE_CLIENT_ID">
      </div>

      <!-- Play button -->
      <button id="play-button" disabled>▶ Play Game</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen" style="display:none;">
    <div class="game-container">
      <h1>🏔️ Ski Resort Tycoon</h1>

      <!-- Stats -->
      <div class="stats">
        <p>💰 Money: $<span id="money">0</span></p>
        <p>🎿 Ski Lifts: <span id="lifts">0</span></p>
        <p>💵 Lift Cost: $<span id="liftCost">100</span></p>
      </div>
      <p>🏨 Lodges: <span id="lodges">0</span></p>
<p>🏨 Lodge Cost: $<span id="lodgeCost">500</span></p>

<button id="buyLodge">Buy Lodge</button>

      <!-- Actions -->
      <div class="actions">
        <button id="click">Sell Lift Tickets (+$10)</button>
        <button id="buyLift">Buy Ski Lift</button>
      </div>
    </div>
  </div>

</body>
</html>
