<div id="startScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100;">
    <h1>🌴 MEGA RESORT TYCOON</h1>
    <button onclick="startGame()" style="padding:15px 30px; font-size:20px; cursor:pointer;">Start Building</button>
</div>

<div id="gui" style="display:none; position:fixed; top:20px; left:20px; color:white; font-family:Arial, sans-serif; text-shadow:2px 2px 4px #000; z-index:10;">
    <div style="font-size:28px; color:#f1c40f;">Money: $<span id="m-val">200</span></div>
    <div style="font-size:18px; color:#2ecc71;">Income: $<span id="i-val">0</span>/s</div>
    <div id="hint" style="margin-top:10px; background:rgba(0,0,0,0.6); padding:10px; border-radius:5px; border-left:5px solid #ffff00;">
        Next: Lobby Foundation
    </div>
</div>
