<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Resort Tycoon 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h1>❄️ SKI RESORT <br><span class="subtitle">TYCOON</span></h1>
            <div class="button-group">
                <button id="guestPlay" class="primary-btn">PLAY AS GUEST</button>
            </div>
            <p class="status-msg">Chromebook Optimized Mode</p>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div id="hud">
            <div class="stat-box">
                <span class="icon">💰</span>
                <span id="moneyDisplay">0</span>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
