<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ski Resort Tycoon</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(to top, #87cefa, #fff); /* sky to snow */
    overflow: hidden;
    font-family: sans-serif;
  }
  #money {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
    background: rgba(255,255,255,0.7);
    padding: 5px 10px;
    border-radius: 5px;
  }
</style>
</head>
<body>
<div id="money">Money: $0</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Skier object
const skier = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  width: 30,
  height: 30,
  color: 'red',
  speed: 0,
  maxSpeed: 5,
  dx: 0,
  dy: 0
};

// Key input
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

let money = 0;

// Game loop
function update() {
  // Movement logic with smooth acceleration
  if (keys['ArrowUp']) skier.dy = Math.max(skier.dy - 0.2, -skier.maxSpeed);
  else if (keys['ArrowDown']) skier.dy = Math.min(skier.dy + 0.2, skier.maxSpeed);
  else skier.dy *= 0.9; // friction

  if (keys['ArrowLeft']) skier.dx = Math.max(skier.dx - 0.2, -skier.maxSpeed);
  else if (keys['ArrowRight']) skier.dx = Math.min(skier.dx + 0.2, skier.maxSpeed);
  else skier.dx *= 0.9; // friction

  skier.x += skier.dx;
  skier.y += skier.dy;

  // Keep skier on screen
  skier.x = Math.max(0, Math.min(canvas.width - skier.width, skier.x));
  skier.y = Math.max(0, Math.min(canvas.height - skier.height, skier.y));

  draw();
  requestAnimationFrame(update);
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background snow
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Skier
  ctx.fillStyle = skier.color;
  ctx.fillRect(skier.x, skier.y, skier.width, skier.height);
}

// Money simulation
setInterval(() => {
  money += 1;
  document.getElementById('money').innerText = `Money: $${money}`;
}, 1000);

update();
</script>
</body>
</html>
