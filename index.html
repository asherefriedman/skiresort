<!DOCTYPE html>
<html>
<head>
  <title>3D Ski Resort Tycoon</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.8);
      padding: 10px;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>💰 Money: $<span id="money">0</span></div>
  <button id="earn">Earn $10</button>
  <button id="buildLift">Build Lift ($100)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="game.js"></script>

</body>
</html>
