.s-sub { font-size:13px; color:rgba(255,255,255,0.55); letter-spacing:4px; text-transform:uppercase; margin-bottom:16px; }
#playBtn { padding:17px 58px; font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; background:#f1c40f; color:#1a1a2e; border:none; border-radius:60px; cursor:pointer; box-shadow:0 6px 28px rgba(241,196,15,0.45),0 2px 0 #b8970b; transition:transform .14s,box-shadow .14s; }
#playBtn:hover { transform:translateY(-4px); }
.s-keys { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
.s-key { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18); border-radius:8px; padding:7px 14px; color:rgba(255,255,255,0.82); font-size:13px; display:flex; align-items:center; gap:6px; }
.s-key kbd { background:rgba(255,255,255,0.18); border-radius:4px; padding:1px 7px; font-family:monospace; font-size:12px; font-weight:bold; }
#hud { position:fixed; top:0; left:0; right:0; z-index:50; display:none; align-items:center; gap:24px; padding:10px 24px; background:rgba(6,12,26,0.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.06); pointer-events:none; }
.hud-brand { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#f1c40f; letter-spacing:2px; margin-right:auto; }
.hud-block { display:flex; flex-direction:column; align-items:flex-end; line-height:1; }
.hud-lbl { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.35); margin-bottom:2px; }
.hud-val { font-family:'Bebas Neue',sans-serif; font-size:26px; }

.nc-lbl { font-size:9px; text-transform:uppercase; letter-spacing:2px; color:rgba(255,255,255,0.35); margin-bottom:3px; }
.nc-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; }
.nc-cost { font-size:12px; color:#f1c40f; margin-top:2px; }

// ─── helpers ──────────────────────────────────────────────────────────────────
function fmtMoney(n){
    n=Math.floor(n);
    if(n>=1000000)return'$'+(n/1e6).toFixed(1)+'M';
    if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';
    return'$'+n;
}
let toastTimer=null;
function showToast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('visible'),2400);
}
function updateProgress(){
    const done=STEPS.filter(s=>s.bought).length;
    document.getElementById('progress-bar').style.width=((done/STEPS.length)*100)+'%';
}

// ─── start ────────────────────────────────────────────────────────────────────
function startGame(){
    document.getElementById('startScreen').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('nextCard').style.display='flex';
    gameRunning=true;
    initThree();
}

let gameRunning=false,nearPad=false;

function initThree(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x87CEEB);
    scene.fog=new THREE.Fog(0x87CEEB,300,1800);

    cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,3000);
    cam.position.set(0,20,50);
    cam.lookAt(0,0,0);

    ren=new THREE.WebGLRenderer({antialias:true});
    ren.setPixelRatio(Math.min(devicePixelRatio,2));
    ren.setSize(innerWidth,innerHeight);
    ren.shadowMap.enabled=true;
    ren.shadowMap.type=THREE.PCFSoftShadowMap;
    document.body.appendChild(ren.domElement);
    clock=new THREE.Clock();

    // Lighting — warm sun + cool fill
    scene.add(new THREE.AmbientLight(0xd4e8ff,0.7));
    const sun=new THREE.DirectionalLight(0xfff4d0,1.2);
    sun.position.set(100,200,80);
    sun.castShadow=true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.left=-400; sun.shadow.camera.right=400;
    sun.shadow.camera.top=400;   sun.shadow.camera.bottom=-400;
    sun.shadow.camera.far=1000;
    scene.add(sun);
    // Fill light from opposite side
    const fill=new THREE.DirectionalLight(0xadd8ff,0.4);
    fill.position.set(-80,100,-60);
    scene.add(fill);

    // Ground — gradient-like by using two planes
    const ground=new THREE.Mesh(
        new THREE.PlaneGeometry(4000,4000),
        new THREE.MeshLambertMaterial({color:0x5aaa5a})
    );
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true;
    scene.add(ground);

    // Paths between areas
    [[0,-35,60,8],[40,0,8,50],[0,38,60,8],[-40,0,8,50]].forEach(([x,z,w,d])=>{
        const path=new THREE.Mesh(
            new THREE.PlaneGeometry(w,d),
            new THREE.MeshLambertMaterial({color:0xd4c4a0})
        );
        path.rotation.x=-Math.PI/2; path.position.set(x,0.05,z);
        scene.add(path);
    });

    const ocean=new THREE.Mesh(
        new THREE.PlaneGeometry(20000,20000),
        new THREE.MeshLambertMaterial({color:0x1a6ea0})
    );
    ocean.rotation.x=-Math.PI/2; ocean.position.y=-1.2;
    scene.add(ocean);

    // GPS group
    gpsGroup=new THREE.Group();
    gpsGroup.renderOrder=999;
    scene.add(gpsGroup);

    // Player — blocky Roblox style
    player=new THREE.Group();
    player.position.set(0,0,0);

    // Torso
    const torso=new THREE.Mesh(new THREE.BoxGeometry(1.4,1.8,0.9),
        new THREE.MeshLambertMaterial({color:0x3949AB}));
    torso.position.y=1.9; torso.castShadow=true; player.add(torso);
    // Head
    const head=new THREE.Mesh(new THREE.BoxGeometry(1.0,1.0,1.0),
        new THREE.MeshLambertMaterial({color:0xFFCC80}));
    head.position.y=3.3; head.castShadow=true; player.add(head);
    // Legs
    [-0.35,0.35].forEach(ox=>{
        const leg=new THREE.Mesh(new THREE.BoxGeometry(0.55,1.2,0.55),
            new THREE.MeshLambertMaterial({color:0x1a237e}));
        leg.position.set(ox,0.6,0); player.add(leg);
    });
    // Arms
    [-0.95,0.95].forEach(ox=>{
        const arm=new THREE.Mesh(new THREE.BoxGeometry(0.45,1.5,0.45),
            new THREE.MeshLambertMaterial({color:0x3949AB}));
        arm.position.set(ox,1.9,0); player.add(arm);
    });
    scene.add(player);

    STEPS[0].bought=true;

// GPS — single dashed line, depthTest:false always visible
const gpsMat=new THREE.MeshBasicMaterial({color:0xffff00,depthTest:false,depthWrite:false,transparent:true,opacity:1});

function rebuildGPS(){
    while(gpsGroup.children.length) gpsGroup.remove(gpsGroup.children[0]);
    if(!activePad) return;
    const fx=player.position.x,fz=player.position.z;
    const tx=activePad.position.x,tz=activePad.position.z;
    const dx=tx-fx,dz=tz-fz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<1) return;
    const nx=dx/dist,nz=dz/dist;
    const angle=Math.atan2(nx,nz);
    const SEG=2.2,GAP=1.4,STEP=SEG+GAP;
    const geo=new THREE.BoxGeometry(0.5,0.28,SEG);
    const count=Math.floor((dist-3)/STEP);
    for(let i=0;i<count;i++){
        const t=3+(i+0.5)*STEP;
        if(t>=dist-2) break;
        const seg=new THREE.Mesh(geo,gpsMat);
        seg.position.set(fx+nx*t,1.0,fz+nz*t);
        seg.rotation.y=angle;
        seg.renderOrder=999;
        gpsGroup.add(seg);
    }
}

// ── 3D collision ──────────────────────────────────────────────────────────────
function testAABB(px,py,pz){
    for(const c of colliders){
        if(px+PLAYER_R>c.minX&&px-PLAYER_R<c.maxX&&
           py+PLAYER_H>c.minY&&py<c.maxY&&
           pz+PLAYER_R>c.minZ&&pz-PLAYER_R<c.maxZ) return true;
    }
    return false;
}
function resolveMovement(ox,oy,oz,nx,ny,nz){
    if(!testAABB(nx,ny,nz)){player.position.set(nx,ny,nz);return;}
    if(!testAABB(nx,oy,oz)){player.position.x=nx;return;}
    if(!testAABB(ox,oy,nz)){player.position.z=nz;return;}
    if(!testAABB(ox,ny,oz)){player.position.y=ny;return;}
    player.position.set(ox,oy,oz);
    if(ny!==oy) vspeed=0;
}

function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),0.05);
    const ox=player.position.x,oy=player.position.y,oz=player.position.z;

    const tgt=KEYS['w']?16:KEYS['s']?-8:0;
    hspeed+=(tgt-hspeed)*0.16;
    let nx=ox-Math.sin(player.rotation.y)*hspeed*dt;
    let nz=oz-Math.cos(player.rotation.y)*hspeed*dt;
    if(KEYS['a']) player.rotation.y+=0.06;
    if(KEYS['d']) player.rotation.y-=0.06;

    if(KEYS[' ']&&!jumping){vspeed=11;jumping=true;}
    let ny=oy;
    if(jumping){
        ny=oy+vspeed*dt; vspeed-=26*dt;
        if(ny<=0){ny=0;jumping=false;vspeed=0;}
    }
    resolveMovement(ox,oy,oz,nx,ny,nz);
    if(jumping&&player.position.y<ny-0.01) vspeed=-1;
    if(jumping&&player.position.y<=0){player.position.y=0;jumping=false;vspeed=0;}

    const ry=player.rotation.y;
    cam.position.x=player.position.x+Math.sin(ry)*32;
    cam.position.y=player.position.y+18;
    cam.position.z=player.position.z+Math.cos(ry)*32;
    cam.lookAt(player.position.x,player.position.y+2,player.position.z);

    for(const p of placed){
        if(p.grp.scale.x<1){
            const ns=Math.min(p.grp.scale.x+0.06,1);
            p.grp.scale.setScalar(ns);
        }
    }
    rebuildGPS();

    if(activePad){
        const dist=player.position.distanceTo(activePad.position);
        const afford=wallet>=activePad.stepData.cost;
        nearPad=dist<7;
        document.getElementById('buyPrompt').style.display=(nearPad&&afford)?'block':'none';
        if(nearPad&&afford&&KEYS['e']){KEYS['e']=false;doBuy(activePad.stepData);}
    } else {
        document.getElementById('buyPrompt').style.display='none';
    }

    ren.render(scene,cam);
    document.getElementById('v-money').textContent=fmtMoney(wallet);
    document.getElementById('v-income').textContent=fmtMoney(income)+'/s';
}

// ── Place object — walls get door gaps ───────────────────────────────────────
function placeObject(s){
    const grp=new THREE.Group();

    if(s.type==='wall'){
        // Build wall with a door gap cut out
        // Door is centered at s.doorX along the wall's length axis
        // We build the wall as up to 3 segments: left of door, above door, right of door
        const isZWall = s.w > s.d; // true = wall runs along X axis; false = along Z
        const wallLen = isZWall ? s.w : s.d;
        const wallH   = s.h;
        const wallThk = isZWall ? s.d : s.w;
        const dw = s.doorW||4;
        const dh = s.doorH||5.5;
        const dc = s.doorX||0; // center of door relative to wall center

        const mat=new THREE.MeshLambertMaterial({color:s.color});

        // Left segment
        const leftW=wallLen/2+dc-dw/2;
        if(leftW>0.1){
            const seg=new THREE.Mesh(
                isZWall?new THREE.BoxGeometry(leftW,wallH,wallThk):new THREE.BoxGeometry(wallThk,wallH,leftW),
                mat
            );
            seg.position.y=wallH/2;
            seg.position.x=isZWall?(-wallLen/2+leftW/2+0):0;
            seg.position.z=isZWall?0:(-wallLen/2+leftW/2);
            seg.castShadow=true; seg.receiveShadow=true;
            grp.add(seg);
        }
        // Right segment
        const rightW=wallLen/2-dc-dw/2;
        if(rightW>0.1){
            const seg=new THREE.Mesh(
                isZWall?new THREE.BoxGeometry(rightW,wallH,wallThk):new THREE.BoxGeometry(wallThk,wallH,rightW),
                mat
            );
            seg.position.y=wallH/2;
            seg.position.x=isZWall?(wallLen/2-rightW/2):0;
            seg.position.z=isZWall?0:(wallLen/2-rightW/2);
            seg.castShadow=true; seg.receiveShadow=true;
            grp.add(seg);
        }
        // Above door segment
        const aboveH=wallH-dh;
        if(aboveH>0.1){
            const seg=new THREE.Mesh(
                isZWall?new THREE.BoxGeometry(dw,aboveH,wallThk):new THREE.BoxGeometry(wallThk,aboveH,dw),
                mat
            );
            seg.position.y=dh+aboveH/2;
            seg.position.x=isZWall?dc:0;
            seg.position.z=isZWall?0:dc;
            seg.castShadow=true; seg.receiveShadow=true;
            grp.add(seg);
        }
        // Door frame (thin gold border)
        const frameMat=new THREE.MeshLambertMaterial({color:C.gold});
        const frameThk=0.2;
        // Top bar
        const ftop=new THREE.Mesh(
            isZWall?new THREE.BoxGeometry(dw+frameThk*2,frameThk,wallThk+0.1):new THREE.BoxGeometry(wallThk+0.1,frameThk,dw+frameThk*2),
            frameMat
        );
        ftop.position.y=dh; ftop.position.x=isZWall?dc:0; ftop.position.z=isZWall?0:dc;
        grp.add(ftop);
        // Left post
        const fl=new THREE.Mesh(
            isZWall?new THREE.BoxGeometry(frameThk,dh,wallThk+0.1):new THREE.BoxGeometry(wallThk+0.1,dh,frameThk),
            frameMat
        );
        fl.position.y=dh/2;
        fl.position.x=isZWall?(dc-dw/2):0;
        fl.position.z=isZWall?0:(dc-dw/2);
        grp.add(fl);
        // Right post
        const fr=new THREE.Mesh(
            isZWall?new THREE.BoxGeometry(frameThk,dh,wallThk+0.1):new THREE.BoxGeometry(wallThk+0.1,dh,frameThk),
            frameMat
        );
        fr.position.y=dh/2;
        fr.position.x=isZWall?(dc+dw/2):0;
        fr.position.z=isZWall?0:(dc+dw/2);
        grp.add(fr);

        // Colliders: left block + right block + above block (NO collider in door gap)
        const addWallCol=(lx,lz,lw,ld,lh)=>{
            colliders.push({
                minX:s.x+lx-lw/2, maxX:s.x+lx+lw/2,
                minY:0, maxY:lh,
                minZ:s.z+lz-ld/2, maxZ:s.z+lz+ld/2,
            });
        };
        if(leftW>0.1){
            if(isZWall) addWallCol(-wallLen/2+leftW/2,0,leftW,wallThk,wallH);
            else        addWallCol(0,-wallLen/2+leftW/2,wallThk,leftW,wallH);
        }
        if(rightW>0.1){
            if(isZWall) addWallCol(wallLen/2-rightW/2,0,rightW,wallThk,wallH);
            else        addWallCol(0,wallLen/2-rightW/2,wallThk,rightW,wallH);
        }
        if(aboveH>0.1){
            if(isZWall) addWallCol(dc,0,dw,wallThk,wallH);
            else        addWallCol(0,dc,wallThk,dw,wallH);
        }

    } else {
        // Normal object
        const mesh=new THREE.Mesh(
            new THREE.BoxGeometry(s.w,s.h,s.d),
            new THREE.MeshLambertMaterial({color:s.color})
        );
        mesh.position.y=s.h/2;
        mesh.castShadow=true; mesh.receiveShadow=true;
        grp.add(mesh);

        // Roblox-style details per type
        if(s.type==='palm'){
            // Trunk with slight taper
            const trunk=new THREE.Mesh(
                new THREE.CylinderGeometry(0.18,0.32,s.h*0.6,8),
                new THREE.MeshLambertMaterial({color:C.trunkBrown})
            );
            trunk.position.y=s.h*0.3; grp.add(trunk);
            // Extra foliage layers
            [0,0.8,1.5].forEach((yoff,i)=>{
                const r=1.8-i*0.4;
                const leaf=new THREE.Mesh(
                    new THREE.CylinderGeometry(r,r*1.2,0.6,7),
                    new THREE.MeshLambertMaterial({color:s.color})
                );
                leaf.position.y=s.h-0.5-yoff; grp.add(leaf);
            });
        }

        if(s.type!=='floor'){
            colliders.push({
                minX:s.x-s.w/2, maxX:s.x+s.w/2,
                minY:0,          maxY:s.h,
                minZ:s.z-s.d/2, maxZ:s.z+s.d/2,
            });
        }
    }

    grp.position.set(s.x,0,s.z);
    grp.scale.setScalar(0.01);
    scene.add(grp);
    s.grp=grp;
    placed.push({grp,step:s});
}

function doBuy(s){
    wallet-=s.cost; s.bought=true; income+=s.inc;
    placeObject(s);
    showToast('✅ '+s.label+' built!');
    spawnNextPad(); updateProgress();
}

function spawnNextPad(){
    padList.forEach(p=>scene.remove(p));
    padList.length=0; activePad=null;
    const next=STEPS.find(s=>!s.bought&&(s.need===0||STEPS.find(x=>x.id===s.need)?.bought));
    if(next){
        const parent=STEPS.find(x=>x.id===next.need);
        const padX=parent?parent.x+(next.ox||0):next.x+(next.ox||0);
        const padZ=parent?parent.z+(next.oz||0):next.z+(next.oz||0);
        const padY=parent?parent.h+PAD_FLOAT:PAD_FLOAT;
        const pad=new THREE.Mesh(
            new THREE.CylinderGeometry(2.5,2.5,0.3,32),
            new THREE.MeshBasicMaterial({color:0xffeb3b,transparent:true,opacity:0.95})
        );
        pad.position.set(padX,padY,padZ);
        pad.stepData=next; scene.add(pad);
        padList.push(pad); activePad=pad;
        document.getElementById('nc-name').textContent=next.label;
        document.getElementById('nc-cost').textContent=next.cost===0?'FREE':fmtMoney(next.cost);
    } else {
        document.getElementById('nc-name').textContent='🏆 Grand Resort Complete!';
        document.getElementById('nc-cost').textContent='';
        showToast('🎉 You built the entire Grand Resort!');
    }
}

setInterval(()=>{if(gameRunning)wallet+=income;},1000);
window.addEventListener('keydown',e=>{if(e.key===' ')e.preventDefault();KEYS[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{KEYS[e.key.toLowerCase()]=false;});
window.addEventListener('resize',()=>{
    if(!cam||!ren)return;
    cam.aspect=innerWidth/innerHeight;
    cam.updateProjectionMatrix();
    ren.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
