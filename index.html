<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Resort Tycoon</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #gui { position: fixed; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; z-index: 10; display: none; pointer-events: none; }
        #m-val { color: #f1c40f; font-size: 28px; font-weight: bold; }
        #i-val { color: #2ecc71; font-size: 18px; }
        #hint { margin-top: 15px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; border-left: 5px solid #ffff00; width: fit-content; }
        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0fbcf9; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #f1c40f; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1 style="font-size: 40px;">🌴 MEGA RESORT</h1>
        <button onclick="startGame()">START BUILDING</button>
    </div>

    <div id="gui">
        <div>Money: $<span id="m-val">200</span></div>
        <div>Income: $<span id="i-val">0</span>/s</div>
        <div id="hint">Next: Lobby Foundation</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
