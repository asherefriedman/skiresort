<!DOCTYPE html>
<html>
<head>
    <title>Mega Resort Tycoon</title>
</head>
<body style="margin: 0; overflow: hidden; font-family: sans-serif; background-color: #0fbcf9;">

    <div id="startScreen" style="position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0fbcf9, #341f97); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white;">
        <h1 style="font-size: 48px; margin-bottom: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">🏝️ MEGA RESORT TYCOON</h1>
        <button onclick="startGame()" style="padding: 25px 50px; font-size: 28px; cursor: pointer; border-radius: 50px; border: none; background-color: #2ecc71; color: white; font-weight: bold; box-shadow: 0 10px 0 #27ae60; transition: 0.1s;">
            START BUILDING
        </button>
    </div>

    <div id="gui" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; display: none; z-index: 10;">
        <div style="background: rgba(255, 255, 255, 0.95); padding: 20px 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 5px solid #ffffff;">
            <div id="money" style="font-size: 36px; font-weight: bold; color: #2d3436; margin: 0;">💰 $<span id="m-val">0</span></div>
            <div id="income" style="color: #2ecc71; font-weight: bold; font-size: 18px; margin-top: 5px;">+$<span id="i-val">0</span>/sec</div>
            <div id="hint" style="background: #f1f2f6; padding: 10px; border-radius: 12px; margin-top: 15px; font-weight: bold; color: #34495e; border: 1px solid #dfe4ea;">Next: Loading...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
