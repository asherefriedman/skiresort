<!DOCTYPE html>
<html>
<head>
    <title>Mega Resort Tycoon</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0fbcf9; }
        #gui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; display: none; z-index: 10; }
        .stat-card { background: rgba(255, 255, 255, 0.9); padding: 15px 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 4px solid #fff; }
        #money { font-size: 32px; font-weight: bold; color: #2d3436; margin: 0; }
        #income { color: #2ecc71; font-weight: bold; margin-top: 5px; }
        #hint { background: #fff; padding: 8px 15px; border-radius: 10px; margin-top: 10px; font-weight: bold; color: #34495e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #startScreen { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0fbcf9, #341f97); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 50px; border: none; background: #2ecc71; color: white; font-weight: bold; box-shadow: 0 10px 0 #27ae60; transition: 0.1s; }
        button:active { transform: translateY(5px); box-shadow: 0 5px 0 #27ae60; }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🏝️ MEGA RESORT TYCOON</h1>
        <button onclick="startGame()">START BUILDING</button>
    </div>
    <div id="gui">
        <div class="stat-card">
            <div id="money">💰 $<span id="m-val">0</span></div>
            <div id="income">+$<span id="i-val">0</span>/sec</div>
            <div id="hint">Next: Loading...</div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
