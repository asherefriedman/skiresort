function fmtMoney(n){
    n=Math.floor(n);
    if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
    if(n>=1000)    return '$'+(n/1000).toFixed(1)+'K';
    return '$'+n;
}

let toastTimer=null;
function showToast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg;
    el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('visible'),2400);
}

function updateProgress(){
    const total=STEPS.length;
    const done=STEPS.filter(s=>s.bought).length;
    document.getElementById('progress-bar').style.width=((done/total)*100)+'%';
}

function startGame(){
    document.getElementById('startScreen').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('nextCard').style.display='flex';
    gameRunning=true;
    initThree();
}

function initThree(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x87CEEB);
    scene.fog=new THREE.Fog(0x87CEEB,300,1500);

    cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,3000);
    cam.position.set(0,20,50);
    cam.lookAt(0,0,0);

    ren=new THREE.WebGLRenderer({antialias:true});
    ren.setPixelRatio(Math.min(devicePixelRatio,2));
    ren.setSize(innerWidth,innerHeight);
    ren.shadowMap.enabled=true;
    document.body.appendChild(ren.domElement);

    clock=new THREE.Clock();

    scene.add(new THREE.AmbientLight(0xffffff,0.9));
    const sun=new THREE.DirectionalLight(0xfff8e1,1.0);
    sun.position.set(80,150,80);
    sun.castShadow=true;
    scene.add(sun);

    const ground=new THREE.Mesh(
        new THREE.PlaneGeometry(3000,3000),
        new THREE.MeshLambertMaterial({color:0x4CAF50})
    );
    ground.rotation.x=-Math.PI/2;
    ground.receiveShadow=true;
    scene.add(ground);

    const ocean=new THREE.Mesh(
        new THREE.PlaneGeometry(20000,20000),
        new THREE.MeshLambertMaterial({color:0x1565C0})
    );
    ocean.rotation.x=-Math.PI/2;
    ocean.position.y=-0.8;
    scene.add(ocean);

    // GPS — single dashed line only, depthTest:false so it shows through everything
    gpsGroup=new THREE.Group();
    gpsGroup.renderOrder=999;
    scene.add(gpsGroup);

    player=new THREE.Group();
    player.position.set(0,0,0);
    const body=new THREE.Mesh(
        new THREE.BoxGeometry(1.2,2.0,1.2),
        new THREE.MeshLambertMaterial({color:0x3949AB})
    );
    body.position.y=1.4;
    body.castShadow=true;
    player.add(body);
    const head=new THREE.Mesh(
        new THREE.BoxGeometry(0.9,0.9,0.9),
        new THREE.MeshLambertMaterial({color:0xFFCC80})
    );
    head.position.y=3.0;
    player.add(head);
    scene.add(player);

    STEPS[0].bought=true;
    placeObject(STEPS[0]);
    spawnNextPad();
    updateProgress();
    ren.render(scene,cam);
    animate();
}

// GPS material — depthTest:false = always visible through everything
const gpsMat=new THREE.MeshBasicMaterial({
    color:0xffff00,
    depthTest:false,
    depthWrite:false,
    transparent:true,
    opacity:1.0
});

function rebuildGPS(){
    while(gpsGroup.children.length) gpsGroup.remove(gpsGroup.children[0]);
    if(!activePad) return;

    const fx=player.position.x, fz=player.position.z;
    const tx=activePad.position.x, tz=activePad.position.z;
    const dx=tx-fx, dz=tz-fz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<1) return;

    const nx=dx/dist, nz=dz/dist;
    const angle=Math.atan2(nx,nz);

    // Single clean dashed line — bright yellow, floats at Y=1 above ground
    // depthTest:false means it renders through walls/objects always
    const SEG=2.2, GAP=1.4, STEP=SEG+GAP;
    const segGeo=new THREE.BoxGeometry(0.5,0.25,SEG);
    const count=Math.floor((dist-3)/STEP);
    for(let i=0;i<count;i++){
        const t=3+(i+0.5)*STEP;
        if(t>=dist-2) break;
        const seg=new THREE.Mesh(segGeo,gpsMat);
        seg.position.set(fx+nx*t, 1.0, fz+nz*t);
        seg.rotation.y=angle;
        seg.renderOrder=999;
        gpsGroup.add(seg);
    }
}

// ── Full 3D collision ─────────────────────────────────────────────────────────
function testAABB(px,py,pz){
    for(const c of colliders){
        if(px+PLAYER_R>c.minX && px-PLAYER_R<c.maxX &&
           py+PLAYER_H>c.minY && py<c.maxY &&
           pz+PLAYER_R>c.minZ && pz-PLAYER_R<c.maxZ) return true;
    }
    return false;
}

function resolveMovement(ox,oy,oz,nx,ny,nz){
    if(!testAABB(nx,ny,nz)){ player.position.set(nx,ny,nz); return; }
    if(!testAABB(nx,oy,oz)){ player.position.x=nx; return; }
    if(!testAABB(ox,oy,nz)){ player.position.z=nz; return; }
    if(!testAABB(ox,ny,oz)){ player.position.y=ny; return; }
    player.position.set(ox,oy,oz);
    if(ny!==oy){ vspeed=0; }
}

function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),0.05);

    const ox=player.position.x, oy=player.position.y, oz=player.position.z;

    const tgt=KEYS['w']?16:KEYS['s']?-8:0;
    hspeed+=(tgt-hspeed)*0.16;
    let nx=ox-Math.sin(player.rotation.y)*hspeed*dt;
    let nz=oz-Math.cos(player.rotation.y)*hspeed*dt;

    if(KEYS['a']) player.rotation.y+=0.06;
    if(KEYS['d']) player.rotation.y-=0.06;

    if(KEYS[' ']&&!jumping){vspeed=11;jumping=true;}
    let ny=oy;
    if(jumping){
        ny=oy+vspeed*dt;
        vspeed-=26*dt;
        if(ny<=0){ny=0;jumping=false;vspeed=0;}
    }

    resolveMovement(ox,oy,oz,nx,ny,nz);

    if(jumping&&player.position.y<ny-0.01) vspeed=-1;
    if(jumping&&player.position.y<=0){player.position.y=0;jumping=false;vspeed=0;}

    const ry=player.rotation.y;
    cam.position.x=player.position.x+Math.sin(ry)*32;
    cam.position.y=player.position.y+18;
    cam.position.z=player.position.z+Math.cos(ry)*32;
    cam.lookAt(player.position.x,player.position.y+1.5,player.position.z);

    for(const p of placed){
        if(p.grp.scale.x<1){
            const ns=Math.min(p.grp.scale.x+0.06,1);
            p.grp.scale.setScalar(ns);
        }
    }

    rebuildGPS();

    if(activePad){
        const dist=player.position.distanceTo(activePad.position);
        const afford=wallet>=activePad.stepData.cost;
        nearPad=dist<7;
        document.getElementById('buyPrompt').style.display=(nearPad&&afford)?'block':'none';
        if(nearPad&&afford&&KEYS['e']){
            KEYS['e']=false;
            doBuy(activePad.stepData);
        }
    } else {
        document.getElementById('buyPrompt').style.display='none';
    }

    ren.render(scene,cam);
    document.getElementById('v-money').textContent=fmtMoney(wallet);
    document.getElementById('v-income').textContent=fmtMoney(income)+'/s';
}

function placeObject(s){
    const grp=new THREE.Group();
    const mesh=new THREE.Mesh(
        new THREE.BoxGeometry(s.w,s.h,s.d),
        new THREE.MeshLambertMaterial({color:s.color})
    );
    mesh.position.y=s.h/2;
    mesh.castShadow=true;
    mesh.receiveShadow=true;
    grp.add(mesh);

    if(s.type==='palm'){
        const trunk=new THREE.Mesh(
            new THREE.CylinderGeometry(0.22,0.32,s.h*0.55,7),
            new THREE.MeshLambertMaterial({color:0x8D6E63})
        );
        trunk.position.y=s.h*0.275;
        grp.add(trunk);
    }

    grp.position.set(s.x,0,s.z);
    grp.scale.setScalar(0.01);
    scene.add(grp);
    s.grp=grp;
    placed.push({grp,step:s});

    if(s.type!=='floor'){
        colliders.push({
            minX:s.x-s.w/2, maxX:s.x+s.w/2,
            minY:0,          maxY:s.h,
            minZ:s.z-s.d/2, maxZ:s.z+s.d/2,
        });
    }
}

function doBuy(s){
    wallet-=s.cost;
    s.bought=true;
    income+=s.inc;
    placeObject(s);
    showToast('✅ '+s.label+' built!');
    spawnNextPad();
    updateProgress();
}

function spawnNextPad(){
    padList.forEach(p=>scene.remove(p));
    padList.length=0;
    activePad=null;

    const next=STEPS.find(s=>!s.bought&&(s.need===0||STEPS.find(x=>x.id===s.need)?.bought));

    if(next){
        const parent=STEPS.find(x=>x.id===next.need);
        const padX=parent ? parent.x+(next.padOffX||0) : next.x+(next.padOffX||0);
        const padZ=parent ? parent.z+(next.padOffZ||0) : next.z+(next.padOffZ||0);
        const padY=parent ? parent.h+PAD_FLOAT : PAD_FLOAT;

        const pad=new THREE.Mesh(
            new THREE.CylinderGeometry(2.5,2.5,0.3,32),
            new THREE.MeshBasicMaterial({color:0xffeb3b,transparent:true,opacity:0.95})
        );
        pad.position.set(padX,padY,padZ);
        pad.stepData=next;
        scene.add(pad);
        padList.push(pad);
        activePad=pad;
        document.getElementById('nc-name').textContent=next.label;
        document.getElementById('nc-cost').textContent=next.cost===0?'FREE':fmtMoney(next.cost);
    } else {
        document.getElementById('nc-name').textContent='🏆 Grand Resort Complete!';
        document.getElementById('nc-cost').textContent='';
        showToast('🎉 You built the entire Grand Resort!');
    }
}

setInterval(()=>{ if(gameRunning) wallet+=income; },1000);

window.addEventListener('keydown',e=>{
    if(e.key===' ')e.preventDefault();
    KEYS[e.key.toLowerCase()]=true;
});
window.addEventListener('keyup',e=>{ KEYS[e.key.toLowerCase()]=false; });
window.addEventListener('resize',()=>{
    if(!cam||!ren)return;
    cam.aspect=innerWidth/innerHeight;
    cam.updateProjectionMatrix();
    ren.setSize(innerWidth,innerHeight);
});
