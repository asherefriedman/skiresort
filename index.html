<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ski Resort Tycoon 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <h1>🏔️ SKI RESORT <span class="blue-text">3D</span></h1>
            <p>Reverse-Engineered Engine v1.2</p>
            <button id="guestPlay" class="start-btn">PLAY GAME</button>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div id="hud">
            <div class="stat-container">
                <div class="stat-box">💰 $<span id="moneyDisplay">0</span></div>
                <div class="zone-box">📍 <span id="zoneDisplay">Lodge</span></div>
            </div>
            <div class="income-tag">+$<span id="incomeDisplay">0</span>/sec</div>
        </div>

        <div id="modPanel">
            <h3>🛠️ MOD DEVELOPER</h3>
            <input type="text" id="modLabel" placeholder="Item Name">
            <select id="modType">
                <option value="floor">Foundation</option>
                <option value="walls">Structure</option>
                <option value="glass">Windows</option>
                <option value="roof">Snow Roof</option>
            </select>
            <input type="number" id="modCost" placeholder="Cost">
            <input type="number" id="modX" placeholder="X Pos">
            <input type="number" id="modY" placeholder="Y Pos">
            <input type="number" id="modIncome" placeholder="Income">
            <input type="number" id="modNeeds" placeholder="Previous ID">
            <button id="addBuildBtn">➕ ADD PAD</button>
            <button id="exportCodeBtn">💾 EXPORT CODE</button>
            <textarea id="exportBox" readonly></textarea>
        </div>
        <button id="toggleMod">🛠️ DEVELOPER TOOLS</button>

        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
