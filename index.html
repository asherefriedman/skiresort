<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Resort Tycoon: MEGA Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <h1>🏔️ SKI RESORT <span class="blue-text">MEGA</span></h1>
            <p id="engineStatus">Loading 3D World...</p>
            <button id="guestPlay" class="start-btn">START TYCOON</button>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div id="hud">
            <div class="stat-box">💰 $<span id="moneyDisplay">0</span></div>
            <div id="zoneDisplay">Next: Lodge Floor ($0)</div>
            <div class="income-tag">+$<span id="incomeDisplay">0</span>/sec</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
