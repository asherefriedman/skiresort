let wallet=500,income=0;

const PLAYER_R=0.65,PLAYER_H=3.2,PAD_FLOAT=1.0;

// ── SAVE/LOAD via localStorage (works on Chromebooks, no login) ───────────────
const SAVE_KEY='grand_meridian_v2';
function saveGame(){
    try{
        const data={wallet:Math.floor(wallet),income:Math.floor(income),
            bought:STEPS.filter(s=>s.bought).map(s=>s.id),
            px:Math.round(player?player.position.x:0),
            pz:Math.round(player?player.position.z:0),ts:Date.now()};
        localStorage.setItem(SAVE_KEY,JSON.stringify(data));
        const fl=document.getElementById('save-flash');
        fl.style.opacity='1';
        setTimeout(()=>fl.style.opacity='0',1800);
    }catch(e){console.warn('Save failed:',e);}
}
function loadSave(){
    try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}
    catch(e){return null;}
}
function hasSave(){
    try{const d=loadSave();return !!(d&&d.bought&&d.bought.length>0);}
    catch(e){return false;}
}
window.addEventListener('DOMContentLoaded',()=>{
    if(hasSave()){
        const d=loadSave();
        const ts=new Date(d.ts);
        document.getElementById('saveStatus').textContent=
            'SAVE — '+d.bought.length+' BUILDINGS — '+ts.toLocaleDateString();
        document.getElementById('loadBtn').style.color='rgba(212,168,68,0.9)';
        document.getElementById('loadBtn').style.borderColor='rgba(212,168,68,0.4)';
    } else {
        document.getElementById('loadBtn').style.opacity='0.3';
        document.getElementById('loadBtn').style.pointerEvents='none';
        document.getElementById('saveStatus').textContent='NO SAVE FOUND';
    }
});
setInterval(()=>{if(gameRunning)saveGame();},60000);
window.addEventListener('beforeunload',()=>{if(gameRunning)saveGame();});

function fmtMoney(n){
    n=Math.floor(n);
    if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';
    if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
    return'$'+n;
}
let toastTimer=null;
function showToast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('visible'),2600);
}
function updateProgress(){
    const done=STEPS.filter(s=>s.bought).length;
    document.getElementById('progress-bar').style.width=((done/STEPS.length)*100)+'%';
}

function startGame(doLoad){
    document.getElementById('startScreen').style.display='none';
    document.getElementById('hud').style.display='flex';
    document.getElementById('nextCard').style.display='flex';
    gameRunning=true;
    initThree(doLoad);
}

function initThree(doLoad){
    initMats();
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x68a8c4);
    scene.fog=new THREE.FogExp2(0x86b8d0,0.0011);
    cam=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,3000);
    cam.position.set(0,22,52); cam.lookAt(0,0,0);
    ren=new THREE.WebGLRenderer({antialias:true});
    ren.setPixelRatio(Math.min(devicePixelRatio,2));
    ren.setSize(innerWidth,innerHeight);
    ren.shadowMap.enabled=true;
    ren.shadowMap.type=THREE.PCFSoftShadowMap;
    ren.toneMapping=THREE.ACESFilmicToneMapping;
    ren.toneMappingExposure=1.05;
    document.body.appendChild(ren.domElement);
    clock=new THREE.Clock();

    scene.add(new THREE.HemisphereLight(0xb0d4ee,0x789050,0.55));
    const sun=new THREE.DirectionalLight(0xfff2d8,1.35);
    sun.position.set(120,220,100); sun.castShadow=true;
    sun.shadow.mapSize.set(4096,4096);
    sun.shadow.camera.left=-500; sun.shadow.camera.right=500;
    sun.shadow.camera.top=500; sun.shadow.camera.bottom=-500;
    sun.shadow.camera.far=1200; sun.shadow.bias=-0.0002;
    scene.add(sun);
    const fill=new THREE.DirectionalLight(0x88b0d8,0.3);
    fill.position.set(-100,80,-60); scene.add(fill);

    const ground=new THREE.Mesh(new THREE.PlaneGeometry(5000,5000),M.grass);
    ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

    // Paths
    [[0,-42,12,60],[58,0,60,10],[-58,0,60,10],[0,-118,12,38]].forEach(([x,z,w,d])=>{
        const p=new THREE.Mesh(new THREE.PlaneGeometry(w,d),M.path);
        p.rotation.x=-Math.PI/2; p.position.set(x,0.05,z); p.receiveShadow=true; scene.add(p);
    });
    const ocean=new THREE.Mesh(new THREE.PlaneGeometry(30000,30000),
        new THREE.MeshStandardMaterial({color:0x065878,roughness:0.04,metalness:0.08}));
    ocean.rotation.x=-Math.PI/2; ocean.position.y=-1.5; scene.add(ocean);

    gpsGroup=new THREE.Group(); gpsGroup.renderOrder=999; scene.add(gpsGroup);

    player=buildPlayer(); player.position.set(0,0,0); scene.add(player);

    if(doLoad){
        const sv=loadSave();
        if(sv){
            wallet=sv.wallet; income=sv.income;
            player.position.set(sv.px||0,0,sv.pz||0);
            STEPS.forEach(s=>{
                if(sv.bought.includes(s.id)){
                    s.bought=true; placeObject(s);
                    if(s.grp) s.grp.scale.setScalar(1);
                }
            });
            showToast('Save loaded — '+sv.bought.length+' buildings restored');
        }
    } else {
        STEPS[0].bought=true; placeObject(STEPS[0]);
        if(STEPS[0].grp) STEPS[0].grp.scale.setScalar(1);
    }

    spawnNextPad(); updateProgress();
    ren.render(scene,cam); animate();
}

function buildPlayer(){
    const grp=new THREE.Group();
    const skin=new THREE.MeshStandardMaterial({color:0xe8c090,roughness:0.85});
    const shirt=new THREE.MeshStandardMaterial({color:0x1a2a48,roughness:0.9});
    const pants=new THREE.MeshStandardMaterial({color:0x0e1520,roughness:0.9});
    const shoe=new THREE.MeshStandardMaterial({color:0x181410,roughness:0.7});
    const hair=new THREE.MeshStandardMaterial({color:0x281808,roughness:0.9});
    const mk=(g,m,x,y,z)=>{const me=new THREE.Mesh(g,m);me.position.set(x,y,z);me.castShadow=true;grp.add(me);return me;};
    [-0.38,0.38].forEach(ox=>mk(new THREE.BoxGeometry(0.58,0.3,0.86),shoe,ox,0.15,0.08));
    [-0.37,0.37].forEach(ox=>mk(new THREE.BoxGeometry(0.54,1.28,0.54),pants,ox,1.04,0));
    mk(new THREE.BoxGeometry(1.36,1.52,0.76),shirt,0,2.44,0);
    [-0.9,0.9].forEach(ox=>{mk(new THREE.BoxGeometry(0.42,1.28,0.42),shirt,ox,2.32,0);mk(new THREE.BoxGeometry(0.38,0.34,0.38),skin,ox,1.6,0);});
    mk(new THREE.BoxGeometry(1.02,1.02,1.02),skin,0,3.5,0);
    mk(new THREE.BoxGeometry(1.06,0.46,1.04),hair,0,3.9,0);
    [-0.22,0.22].forEach(ox=>{const e=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.13,0.04),new THREE.MeshStandardMaterial({color:0x101820}));e.position.set(ox,3.46,0.52);grp.add(e);});
    return grp;
}

const gpsMat=new THREE.MeshBasicMaterial({color:0xffe040,depthTest:false,depthWrite:false,transparent:true,opacity:0.95});
function rebuildGPS(){
    while(gpsGroup.children.length)gpsGroup.remove(gpsGroup.children[0]);
    if(!activePad)return;
    const fx=player.position.x,fz=player.position.z;
    const tx=activePad.position.x,tz=activePad.position.z;
    const dx=tx-fx,dz=tz-fz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<1)return;
    const nx=dx/dist,nz=dz/dist,angle=Math.atan2(nx,nz);
    const SEG=2.0,GAP=1.2,STEP=SEG+GAP;
    const geo=new THREE.BoxGeometry(0.42,0.22,SEG);
    const n=Math.floor((dist-3)/STEP);
    for(let i=0;i<n;i++){
        const t=3+(i+0.5)*STEP;
        if(t>=dist-2)break;
        const seg=new THREE.Mesh(geo,gpsMat);
        seg.position.set(fx+nx*t,0.9,fz+nz*t);
        seg.rotation.y=angle; seg.renderOrder=999;
        gpsGroup.add(seg);
    }
}

function testAABB(px,py,pz){
    for(const c of colliders){
        if(px+PLAYER_R>c.minX&&px-PLAYER_R<c.maxX&&py+PLAYER_H>c.minY&&py<c.maxY&&pz+PLAYER_R>c.minZ&&pz-PLAYER_R<c.maxZ)return true;
    }
    return false;
}
function resolveMovement(ox,oy,oz,nx,ny,nz){
    if(!testAABB(nx,ny,nz)){player.position.set(nx,ny,nz);return;}
    if(!testAABB(nx,oy,oz)){player.position.x=nx;return;}
    if(!testAABB(ox,oy,nz)){player.position.z=nz;return;}
    if(!testAABB(ox,ny,oz)){player.position.y=ny;return;}
    player.position.set(ox,oy,oz);
    if(ny!==oy)vspeed=0;
}

function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),0.05);
    const ox=player.position.x,oy=player.position.y,oz=player.position.z;
    const tgt=KEYS['w']?18:KEYS['s']?-9:0;
    hspeed+=(tgt-hspeed)*0.16;
    let nx=ox-Math.sin(player.rotation.y)*hspeed*dt;
    let nz=oz-Math.cos(player.rotation.y)*hspeed*dt;
    if(KEYS['a'])player.rotation.y+=0.06;
    if(KEYS['d'])player.rotation.y-=0.06;
    if(KEYS[' ']&&!jumping){vspeed=12;jumping=true;}
    let ny=oy;
    if(jumping){ny=oy+vspeed*dt;vspeed-=28*dt;if(ny<=0){ny=0;jumping=false;vspeed=0;}}
    resolveMovement(ox,oy,oz,nx,ny,nz);
    if(jumping&&player.position.y<ny-0.01)vspeed=-1;
    if(jumping&&player.position.y<=0){player.position.y=0;jumping=false;vspeed=0;}
    const ry=player.rotation.y;
    cam.position.x=player.position.x+Math.sin(ry)*30;
    cam.position.y=player.position.y+17;
    cam.position.z=player.position.z+Math.cos(ry)*30;
    cam.lookAt(player.position.x,player.position.y+2,player.position.z);
    for(const p of placed){if(p.grp.scale.x<1){const ns=Math.min(p.grp.scale.x+0.055,1);p.grp.scale.setScalar(ns);}}
    rebuildGPS();
    if(activePad){
        const d=player.position.distanceTo(activePad.position);
        const afford=wallet>=activePad.stepData.cost;
        nearPad=d<7;
        document.getElementById('buyPrompt').style.display=(nearPad&&afford)?'block':'none';
        if(nearPad&&afford&&KEYS['e']){KEYS['e']=false;doBuy(activePad.stepData);}
    } else {document.getElementById('buyPrompt').style.display='none';}
    ren.render(scene,cam);
    document.getElementById('v-money').textContent=fmtMoney(wallet);
    document.getElementById('v-income').textContent=fmtMoney(income)+'/s';
}

function getMat(n){return M[n]||M.plaster;}
function addCol(wx,wz,ww,wh,wd){colliders.push({minX:wx-ww/2,maxX:wx+ww/2,minY:0,maxY:wh,minZ:wz-wd/2,maxZ:wz+wd/2});}

function placeObject(s){
    const grp=new THREE.Group();
    const mat=getMat(s.mat);
    if(s.type==='wall'){buildWall(grp,s);}
    else if(s.type==='palm'){buildPalm(grp,s,mat);addCol(s.x,s.z,s.w*0.55,s.h,s.d*0.55);}
    else if(s.type==='custom'){buildCustom(grp,s,mat);}
    else{
        const mesh=new THREE.Mesh(new THREE.BoxGeometry(s.w,s.h,s.d),mat);
        mesh.position.y=s.h/2; mesh.castShadow=true; mesh.receiveShadow=true; grp.add(mesh);
        if(s.type!=='floor')addCol(s.x,s.z,s.w,s.h,s.d);
    }
    grp.position.set(s.x,0,s.z); grp.scale.setScalar(0.01);
    scene.add(grp); s.grp=grp; placed.push({grp,step:s});
}

// WALL — fixed door position
function buildWall(grp,s){
    const mat=getMat(s.mat);
    const isZ=s.w>s.d;
    const len=isZ?s.w:s.d,thk=isZ?s.d:s.w;
    const H=s.h,dw=s.doorW||4,dh=s.doorH||6;
    const leftLen=len/2-dw/2, rightLen=len/2-dw/2, aboveH=H-dh;

    function seg(lx,lz,sw,sh,sd){
        if(sw<0.05||sd<0.05)return;
        const m=new THREE.Mesh(isZ?new THREE.BoxGeometry(sw,sh,sd):new THREE.BoxGeometry(sd,sh,sw),mat);
        m.position.set(isZ?lx:0,sh/2,isZ?0:lx); m.castShadow=true; m.receiveShadow=true; grp.add(m);
    }
    // Left panel
    if(leftLen>0.05){
        seg(-len/2+leftLen/2,0,leftLen,H,thk);
        if(isZ)addCol(s.x-len/2+leftLen/2,s.z,leftLen,H,thk);
        else   addCol(s.x,s.z-len/2+leftLen/2,thk,H,leftLen);
    }
    // Right panel
    if(rightLen>0.05){
        seg(len/2-rightLen/2,0,rightLen,H,thk);
        if(isZ)addCol(s.x+len/2-rightLen/2,s.z,rightLen,H,thk);
        else   addCol(s.x,s.z+len/2-rightLen/2,thk,H,rightLen);
    }
    // Lintel — y = dh to H
    if(aboveH>0.05){
        const lm=new THREE.Mesh(isZ?new THREE.BoxGeometry(dw,aboveH,thk):new THREE.BoxGeometry(thk,aboveH,dw),mat);
        lm.position.set(0,dh+aboveH/2,0); lm.castShadow=true; lm.receiveShadow=true; grp.add(lm);
        if(isZ)colliders.push({minX:s.x-dw/2,maxX:s.x+dw/2,minY:dh,maxY:H,minZ:s.z-thk/2,maxZ:s.z+thk/2});
        else   colliders.push({minX:s.x-thk/2,maxX:s.x+thk/2,minY:dh,maxY:H,minZ:s.z-dw/2,maxZ:s.z+dw/2});
    }
    // Door frame
    const ft=0.17,fm=M.brass;
    const mkf=(x,y,z,fw,fh,fd)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd),fm);m.position.set(x,y,z);grp.add(m);};
    if(isZ){
        mkf(0,dh,0,dw+ft*2,ft,thk+0.1);
        mkf(-dw/2-ft/2,dh/2,0,ft,dh,thk+0.1);
        mkf(dw/2+ft/2,dh/2,0,ft,dh,thk+0.1);
    } else {
        mkf(0,dh,0,thk+0.1,ft,dw+ft*2);
        mkf(0,dh/2,-dw/2-ft/2,thk+0.1,dh,ft);
        mkf(0,dh/2,dw/2+ft/2,thk+0.1,dh,ft);
    }
}

function buildPalm(grp,s,mat){
    const th=s.h*0.7;
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.27,th,10),M.trunk);
    trunk.position.y=th/2; trunk.castShadow=true; grp.add(trunk);
    if(s.h>12){
        [0,1.8,3.4,5.0,6.4].forEach((yo,i)=>{
            const r=(s.w*0.33)*(1-i*0.15);
            const c=new THREE.Mesh(new THREE.ConeGeometry(r,s.h*0.21,10),mat);
            c.position.y=th*0.45+yo*(s.h*0.09); c.castShadow=true; grp.add(c);
        });
    } else {
        [0,0.9,1.7].forEach((yo,i)=>{
            const r=(s.w*1.05)*(1-i*0.22);
            const l=new THREE.Mesh(new THREE.CylinderGeometry(r*0.26,r,0.5,8),mat);
            l.position.y=th-0.3+yo; l.castShadow=true; grp.add(l);
        });
    }
}

function buildCustom(grp,s,mat){

    const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
    const cyl=(r,h,sg=10)=>new THREE.CylinderGeometry(r,r,h,sg);
    const sph=(r,sg=10)=>new THREE.SphereGeometry(r,sg,sg);

    switch(s.custom){

        add(box(s.w,s.h,s.d),M.walnut,0,s.h/2,0);

    case 'sofa':{

        const lighterC=new THREE.MeshStandardMaterial({color:adjustColor(getMat(s.mat).color.getHex(),1.18),roughness:0.96});
        const nc=Math.round(s.w/2);
        const cw=(s.w-0.28)/nc;
        for(let i=0;i<nc;i++) add(box(cw-0.1,0.24,s.d-0.5),lighterC,-s.w/2+0.14+cw/2+i*cw,0.69,0.08);
        [-s.w/2+0.14,s.w/2-0.14].forEach(ox=>add(box(0.26,0.78,s.d),mat,ox,0.55,0));

        [[s.w/2-0.15,s.d/2-0.15],[-(s.w/2-0.15),s.d/2-0.15],[s.w/2-0.15,-(s.d/2-0.15)],[-(s.w/2-0.15),-(s.d/2-0.15)]]
            .forEach(([lx,lz])=>add(box(0.08,s.h,0.08),mat,lx,s.h/2,lz));
        addCol(s.x,s.z,s.w,s.h+0.12,s.d); break;
    case 'piano':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);

        [-0.2,0,0.2].forEach(px=>add(cyl(0.03,0.22),M.chrome,px,0.04,s.d/2+0.08));

        addCol(s.x,s.z,s.w,s.h,s.d); break;
    case 'counter':
        add(box(s.w,0.07,s.d),M.marble,0,0.04,0);
        add(box(s.w+0.06,0.04,s.d+0.06),M.chrome,0,0.09,0); break;
    case 'jacuzzi':
        add(box(s.w,s.h,s.d),M.marble,0,s.h/2,0);
        add(box(s.w-0.45,0.08,s.d-0.45),M.poolBlue,0,s.h-0.04,0);
        for(let a=0;a<6;a++){const ang=a*Math.PI/3;add(cyl(0.055,0.13),M.chrome,(s.w/2-0.32)*Math.cos(ang),s.h*0.68,(s.d/2-0.32)*Math.sin(ang));}
        add(box(s.w+0.9,0.32,0.75),M.marbleGray,0,0.16,s.d/2+0.38);
        addCol(s.x,s.z,s.w,s.h,s.d); break;
    case 'abutment':
        add(box(s.w,s.h,s.d),M.stoneLight,0,s.h/2,0);
        [-6,6].forEach(ox=>add(box(2.8,0.36,2.8),M.darkMet,ox,s.h+0.18,0));
        addCol(s.x,s.z,s.w,s.h,s.d); break;
    case 'pylon':
        add(box(s.w,s.h,s.d),M.stoneLight,0,s.h/2,0);
        add(box(s.w+1.8,1.4,s.d+1.8),M.stoneLight,0,s.h+0.7,0);
        for(let i=0;i<5;i++) add(box(0.18,0.18,0.18),M.darkMet,s.w/2+0.1,s.h-i*7,0);
        addCol(s.x,s.z,s.w,s.h+1.4,s.d); break;
    case 'lamppost':
        add(cyl(0.1,s.h),M.darkMet,0,s.h/2,0);
        add(box(1.1,0.09,0.09),M.darkMet,0.5,s.h-0.1,0);
        add(sph(0.18,8),M.goldLt,1.1,s.h-0.06,0);
        addCol(s.x,s.z,0.14,s.h,0.14); break;
    case 'fireplace':
        add(box(s.w,s.h,s.d),M.stone,0,s.h/2,0);
        add(box(s.w-0.55,s.h*0.44,0.18),M.black,0,s.h*0.22,s.d/2+0.1);
        add(box(s.w+0.38,0.18,s.d+0.28),M.oakDk,0,s.h*0.68,0);
        add(box(s.w-0.95,s.h*0.32,s.d-0.9),M.concreteDk,0,s.h*0.82,0);
        addCol(s.x,s.z,s.w,s.h,s.d); break;
    case 'skiwall':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        for(let i=0;i<3;i++) add(box(0.07,s.h-0.75,0.11),M.burg,  (i-1)*2,s.h/2+0.08,s.d/2+0.07);
        for(let i=0;i<4;i++) add(cyl(0.032,s.h-1.1),M.steel,(i-1.5)*1.25,s.h/2,s.d/2+0.1);
        addCol(s.x,s.z,s.w,s.h,s.d); break;
    case 'aroof':
        add(box(s.w,0.45,s.d),mat,0,s.h,0);
        add(box(0.38,0.55,s.d),mat,0,s.h+0.5,0);
        add(box(s.w+0.55,0.22,0.22),M.oakLt,0,s.h+0.08,s.d/2);
        add(box(s.w+0.55,0.22,0.22),M.oakLt,0,s.h+0.08,-s.d/2); break;
    case 'arch':
        [-s.w/2+0.7,s.w/2-0.7].forEach(ox=>add(box(1.4,s.h,1.4),mat,ox,s.h/2,0));
        add(box(s.w,1.1,1.4),mat,0,s.h-0.55,0);
        add(box(s.w-3.2,1.65,0.14),M.gold,0,s.h-1.45,0.75);
        add(sph(0.55,12),mat,0,s.h+0.55,0);
        addCol(s.x-s.w/2,s.z,1.4,s.h,1.4);
        addCol(s.x+s.w/2,s.z,1.4,s.h,1.4); break;
    default:
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        addCol(s.x,s.z,s.w,s.h,s.d);
    }
}

function adjustColor(hex,factor){
    const r=Math.min(255,Math.floor(((hex>>16)&0xff)*factor));
    const g=Math.min(255,Math.floor(((hex>>8)&0xff)*factor));
    const b=Math.min(255,Math.floor((hex&0xff)*factor));
    return (r<<16)|(g<<8)|b;
}

function doBuy(s){
    wallet-=s.cost; s.bought=true; income+=s.inc;
    placeObject(s); showToast('✅  '+s.label);
    spawnNextPad(); updateProgress();
}

function spawnNextPad(){
    padList.forEach(p=>scene.remove(p)); padList.length=0; activePad=null;
    const next=STEPS.find(s=>!s.bought&&(s.need===0||STEPS.find(x=>x.id===s.need)?.bought));
    if(next){
        const parent=STEPS.find(x=>x.id===next.need);
        const padX=parent?parent.x+(next.ox||0):next.x+(next.ox||0);
        const padZ=parent?parent.z+(next.oz||0):next.z+(next.oz||0);
        const padY=(parent&&parent.type!=='floor'?parent.h:0)+PAD_FLOAT;
        const pad=new THREE.Mesh(new THREE.CylinderGeometry(2.2,2.2,0.2,32),
            new THREE.MeshBasicMaterial({color:0xffe040,transparent:true,opacity:0.9}));
        pad.position.set(padX,padY,padZ); pad.stepData=next;
        scene.add(pad); padList.push(pad); activePad=pad;
        document.getElementById('nc-name').textContent=next.label;
        document.getElementById('nc-cost').textContent=next.cost===0?'COMPLIMENTARY':fmtMoney(next.cost);
    } else {
        document.getElementById('nc-name').textContent='GRAND MERIDIAN COMPLETE';
        document.getElementById('nc-cost').textContent='';
        showToast('🎉 The Grand Meridian is open!');
        saveGame();
    }
}

setInterval(()=>{if(gameRunning)wallet+=income;},1000);
window.addEventListener('keydown',e=>{if(e.key===' ')e.preventDefault();KEYS[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{KEYS[e.key.toLowerCase()]=false;});
window.addEventListener('resize',()=>{if(!cam||!ren)return;cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});
</script>
