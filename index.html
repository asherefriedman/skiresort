<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ski Resort Tycoon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen center">
    <h1>Ski Resort Tycoon</h1>
    <input type="text" id="username" placeholder="Enter username"><br><br>
    <button onclick="login()">Sign In</button>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen center">
    <div class="title">Ski Resort Tycoon</div>
    <button onclick="startGame()">Play</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

    <!-- UI -->
    <div id="gameUI">
        💰 Money: <span id="money">0</span><br>
        🎿 Lifts: <span id="lifts">0</span>
    </div>

    <!-- GAME WORLD -->
    <div id="gameWorld">
        <div id="player"></div>
    </div>

    <!-- ACTIONS -->
    <div class="center">
        <button onclick="earnMoney()">Sell Tickets (+10)</button>
        <button onclick="buyLift()">Buy Lift (<span id="liftCost">100</span>)</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
