<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ski Resort Tycoon 3D - Full Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="loginScreen">
        <div class="login-card">
            <h1>🏔️ SKI RESORT <span class="blue-text">3D</span></h1>
            <p id="engineStatus">Loading 3D Assets...</p>
            <button id="guestPlay" class="start-btn" style="display:none;">START GAME</button>
        </div>
    </div>

    <div id="gameScreen" style="display: none;">
        <div id="hud">
            <div class="stat-box">💰 $<span id="moneyDisplay">0</span></div>
            <div id="zoneDisplay">Next: Lodge Floor ($0)</div>
            <div class="income-tag">+$<span id="incomeDisplay">0</span>/sec</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
