<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Resort Tycoon</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0fbcf9; }
        #gui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        .stat-card { background: rgba(255, 255, 255, 0.9); padding: 15px 30px; border-radius: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 4px solid #fff; pointer-events: auto; }
        .money { font-size: 32px; font-weight: bold; color: #2d3436; }
        .income { font-size: 18px; color: #27ae60; font-weight: bold; }
        #hint { margin-top: 10px; font-size: 14px; color: #636e72; background: #f1f2f6; padding: 5px 15px; border-radius: 10px; display: inline-block; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0fbcf9; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        button { padding: 15px 40px; font-size: 24px; cursor: pointer; border-radius: 50px; border: none; background: #fff; color: #0fbcf9; font-weight: bold; transition: 0.2s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>MEGA RESORT TYCOON</h1>
        <button onclick="startGame()">START BUILDING</button>
    </div>

    <div id="gui" style="display:none;">
        <div class="stat-card">
            <div class="money">💰 $<span id="m-val">0</span></div>
            <div class="income">+$<span id="i-val">0</span>/sec</div>
            <div id="hint">Next: Loading...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
