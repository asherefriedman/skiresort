<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Resort Tycoon: Global</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #a29bfe; }
        #gui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        .stats-top { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.9); padding: 15px 40px; border-radius: 20px; border-bottom: 6px solid #27ae60; text-align: center; pointer-events: auto; }
        .money { font-size: 38px; font-weight: 900; color: #2d3436; display: block; }
        .inc { font-size: 18px; color: #27ae60; font-weight: bold; }
        .progress-container { position: absolute; bottom: 30px; width: 300px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); border-radius: 10px; padding: 5px; }
        .progress-bar { height: 15px; background: #00cec9; width: 0%; border-radius: 8px; transition: 0.3s; }
        #hint { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); color: white; text-shadow: 2px 2px 4px #000; font-weight: bold; }
        #startScreen { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #55efc4, #00b894); z-index: 100; display: flex; justify-content: center; align-items: center; pointer-events: auto; }
        .btn { padding: 20px 60px; font-size: 28px; font-weight: bold; background: #2d3436; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 8px 0 #000; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
    </style>
</head>
<body>
    <div id="startScreen">
        <div style="text-align:center; color:white;">
            <h1 style="font-size:60px; margin-bottom:10px;">MEGA RESORT</h1>
            <p style="font-size:20px; margin-bottom:30px;">Build Every Room. Build the Empire.</p>
            <button class="btn" onclick="startGame()">CLAIM PROPERTY</button>
        </div>
    </div>
    <div id="gui">
        <div class="stats-top">
            <span class="money">💰 $<span id="m-val">0</span></span>
            <span class="inc">+$<span id="i-val">0</span>/sec</span>
        </div>
        <div id="hint">Next: Entrance Gate</div>
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>

    <div id="save-menu" style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 8px; pointer-events: auto; font-size: 12px; z-index: 2000;">
    <div id="save-status">💾 Game Autosaved</div>
    <button onclick="exportSave()" style="margin-top:5px; cursor:pointer;">Copy Save Code</button>
    <button onclick="importSave()" style="margin-top:5px; cursor:pointer;">Load from Code</button>
</div>
</body>
</html>
