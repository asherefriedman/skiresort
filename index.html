<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Meridian Resort</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'DM Sans',sans-serif;}
canvas{position:fixed;top:0;left:0;width:100%!important;height:100%!important;z-index:1;display:block;}

#startScreen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(170deg,#0a1628 0%,#0d2440 40%,#1a3a5c 70%,#0d2440 100%);}
#startScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(180,140,80,0.12) 0%,transparent 65%);pointer-events:none;}
.s-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3vw,26px);color:rgba(180,148,80,0.9);letter-spacing:8px;text-transform:uppercase;margin-bottom:-8px;}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,11vw,110px);color:#fff;letter-spacing:5px;line-height:0.9;text-align:center;text-shadow:0 2px 40px rgba(0,0,0,0.6);}
.s-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(180,148,80,0.8),transparent);margin:4px 0;}
.s-sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:5px;text-transform:uppercase;margin-bottom:20px;}
#playBtn{padding:16px 56px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;background:transparent;color:#d4a844;border:1px solid rgba(212,168,68,0.6);border-radius:2px;cursor:pointer;transition:all .2s;position:relative;}
#playBtn::before{content:'';position:absolute;inset:0;background:rgba(212,168,68,0);transition:background .2s;}
#playBtn:hover{background:rgba(212,168,68,0.1);border-color:#d4a844;letter-spacing:6px;}
.s-keys{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.s-key{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:6px 12px;color:rgba(255,255,255,0.6);font-size:12px;display:flex;align-items:center;gap:5px;letter-spacing:1px;}
.s-key kbd{background:rgba(255,255,255,0.08);border-radius:3px;padding:1px 6px;font-family:monospace;font-size:11px;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;align-items:center;gap:0;padding:0 32px;background:rgba(5,10,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,168,68,0.2);pointer-events:none;height:56px;}
.hud-brand{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(212,168,68,0.9);letter-spacing:4px;margin-right:auto;}
.hud-divider{width:1px;height:28px;background:rgba(255,255,255,0.08);margin:0 24px;}
.hud-block{display:flex;flex-direction:column;align-items:flex-end;line-height:1;}
.hud-lbl{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:3px;}
.hud-val{font-family:'Bebas Neue',sans-serif;font-size:24px;}
#v-money{color:#d4a844;}#v-income{color:#4ecb71;}

#progress{position:fixed;top:56px;left:0;right:0;z-index:50;height:2px;background:rgba(255,255,255,0.05);pointer-events:none;}
#progress-bar{height:100%;background:linear-gradient(90deg,#d4a844,#e8c96a);width:0%;transition:width .5s;}

/* Next card */
#nextCard{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;display:none;flex-direction:column;align-items:center;padding:14px 28px 12px;background:rgba(5,10,20,0.92);backdrop-filter:blur(16px);border:1px solid rgba(212,168,68,0.2);border-top:2px solid rgba(212,168,68,0.7);border-radius:2px;color:#fff;pointer-events:none;white-space:nowrap;text-align:center;}
.nc-lbl{font-size:8px;text-transform:uppercase;letter-spacing:3px;color:rgba(212,168,68,0.7);margin-bottom:4px;}
.nc-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;}
.nc-cost{font-size:11px;color:rgba(212,168,68,0.8);margin-top:3px;letter-spacing:1px;}

/* Buy prompt */
#buyPrompt{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:50;display:none;padding:10px 28px;background:rgba(212,168,68,0.95);color:#0a0a0a;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;border-radius:2px;pointer-events:none;animation:buyPulse 1s ease-in-out infinite;}
@keyframes buyPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:0.95}50%{transform:translateX(-50%) scale(1.04);opacity:1}}

/* Toast */
#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:50;padding:9px 24px;background:rgba(78,203,113,0.95);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;border-radius:2px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;}
#toast.visible{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

// ── helpers ───────────────────────────────────────────────────────────────────
function fmtMoney(n){
    n=Math.floor(n);
    if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';
    if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
    return'$'+n;
}
let toastTimer=null;
function showToast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('visible'),2600);
}
function updateProgress(){
    const done=STEPS.filter(s=>s.bought).length;
    document.getElementById('progress-bar').style.width=((done/STEPS.length)*100)+'%';
}

    document.getElementById('startScreen').style.display='none';

    gameRunning=true;

}

// ── GPS — single dashed line, depthTest:false ─────────────────────────────────
const gpsMat=new THREE.MeshBasicMaterial({color:0xffe040,depthTest:false,depthWrite:false,transparent:true,opacity:0.95});

function rebuildGPS(){
    while(gpsGroup.children.length) gpsGroup.remove(gpsGroup.children[0]);
    if(!activePad) return;
    const fx=player.position.x, fz=player.position.z;
    const tx=activePad.position.x, tz=activePad.position.z;
    const dx=tx-fx, dz=tz-fz;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<1) return;
    const nx=dx/dist, nz=dz/dist;
    const angle=Math.atan2(nx,nz);
    const SEG=2.0,GAP=1.2,STEP=SEG+GAP;
    const geo=new THREE.BoxGeometry(0.4,0.22,SEG);
    const n=Math.floor((dist-3)/STEP);
    for(let i=0;i<n;i++){
        const t=3+(i+0.5)*STEP;
        if(t>=dist-2) break;
        const seg=new THREE.Mesh(geo,gpsMat);
        seg.position.set(fx+nx*t,0.9,fz+nz*t);
        seg.rotation.y=angle;
        seg.renderOrder=999;
        gpsGroup.add(seg);
    }
}

// ── collision ─────────────────────────────────────────────────────────────────
function testAABB(px,py,pz){
    for(const c of colliders){
        if(px+PLAYER_R>c.minX&&px-PLAYER_R<c.maxX&&
           py+PLAYER_H>c.minY&&py<c.maxY&&
           pz+PLAYER_R>c.minZ&&pz-PLAYER_R<c.maxZ) return true;
    }
    return false;
}
function resolveMovement(ox,oy,oz,nx,ny,nz){
    if(!testAABB(nx,ny,nz)){player.position.set(nx,ny,nz);return;}
    if(!testAABB(nx,oy,oz)){player.position.x=nx;return;}
    if(!testAABB(ox,oy,nz)){player.position.z=nz;return;}
    if(!testAABB(ox,ny,oz)){player.position.y=ny;return;}
    player.position.set(ox,oy,oz);
    if(ny!==oy) vspeed=0;
}

// ── animate ───────────────────────────────────────────────────────────────────
function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),0.05);
    const ox=player.position.x,oy=player.position.y,oz=player.position.z;

    const tgt=KEYS['w']?16:KEYS['s']?-8:0;
    hspeed+=(tgt-hspeed)*0.16;
    let nx=ox-Math.sin(player.rotation.y)*hspeed*dt;
    let nz=oz-Math.cos(player.rotation.y)*hspeed*dt;
    if(KEYS['a']) player.rotation.y+=0.06;
    if(KEYS['d']) player.rotation.y-=0.06;

    if(KEYS[' ']&&!jumping){vspeed=11;jumping=true;}
    let ny=oy;
    if(jumping){
        ny=oy+vspeed*dt; vspeed-=26*dt;
        if(ny<=0){ny=0;jumping=false;vspeed=0;}
    }
    resolveMovement(ox,oy,oz,nx,ny,nz);
    if(jumping&&player.position.y<ny-0.01) vspeed=-1;
    if(jumping&&player.position.y<=0){player.position.y=0;jumping=false;vspeed=0;}

    const ry=player.rotation.y;
    cam.position.x=player.position.x+Math.sin(ry)*30;
    cam.position.y=player.position.y+17;
    cam.position.z=player.position.z+Math.cos(ry)*30;
    cam.lookAt(player.position.x,player.position.y+2,player.position.z);

    for(const p of placed){
        if(p.grp.scale.x<1){
            const ns=Math.min(p.grp.scale.x+0.055,1);
            p.grp.scale.setScalar(ns);
        }
    }
    rebuildGPS();

    if(activePad){
        const d=player.position.distanceTo(activePad.position);
        const afford=wallet>=activePad.stepData.cost;
        nearPad=d<7;
        document.getElementById('buyPrompt').style.display=(nearPad&&afford)?'block':'none';
        if(nearPad&&afford&&KEYS['e']){KEYS['e']=false;doBuy(activePad.stepData);}
    } else {
        document.getElementById('buyPrompt').style.display='none';
    }

    ren.render(scene,cam);
    document.getElementById('v-money').textContent=fmtMoney(wallet);
    document.getElementById('v-income').textContent=fmtMoney(income)+'/s';
}

// ── placeObject ───────────────────────────────────────────────────────────────
function getMat(name){
    return MAT[name]||MAT.plaster;
}

function placeObject(s){
    const grp=new THREE.Group();
    const mat=getMat(s.mat);

    if(s.type==='wall'){
        buildWall(grp,s);
    } else if(s.type==='palm'){
        buildPalm(grp,s,mat);
        if(s.type!=='floor'){
            colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        }
    } else if(s.type==='custom'){
        buildCustom(grp,s,mat);
    } else {
        // floor or block
        const mesh=new THREE.Mesh(new THREE.BoxGeometry(s.w,s.h,s.d),mat);
        mesh.position.y=s.h/2;
        mesh.castShadow=true; mesh.receiveShadow=true;
        grp.add(mesh);
        if(s.type!=='floor'){
            colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        }
    }

    grp.position.set(s.x,0,s.z);
    grp.scale.setScalar(0.01);
    scene.add(grp);
    s.grp=grp;
    placed.push({grp,step:s});
}

// ── buildWall — FIXED door logic ──────────────────────────────────────────────
// Key fix: segments are positioned RELATIVE to group center (which sits at s.x,s.z)
// so we do NOT add s.x/s.z again — the group handles world position.
function buildWall(grp,s){
    const mat=getMat(s.mat);
    const frameMat=MAT.brass;
    const isZ=s.w>s.d;          // wall runs along X if w>d, along Z otherwise
    const len=isZ?s.w:s.d;      // full wall length
    const thk=isZ?s.d:s.w;      // wall thickness
    const H=s.h;
    const dw=s.doorW||4;
    const dh=s.doorH||6;
    const dc=0;                  // door center offset along wall (always centred)

    // Left panel
    const leftLen=(len/2+dc-dw/2);
    if(leftLen>0.05){
        const seg=new THREE.Mesh(
            isZ?new THREE.BoxGeometry(leftLen,H,thk):new THREE.BoxGeometry(thk,H,leftLen),
            mat
        );
        // Position: left edge of wall to right edge of left panel
        seg.position.set(
            isZ?(-len/2+leftLen/2):0,
            H/2,
            isZ?0:(-len/2+leftLen/2)
        );
        seg.castShadow=true; seg.receiveShadow=true;
        grp.add(seg);
        // collider
        colliders.push(isZ?
            {minX:s.x-len/2,           maxX:s.x-len/2+leftLen, minY:0,maxY:H, minZ:s.z-thk/2,maxZ:s.z+thk/2}:
            {minX:s.x-thk/2,           maxX:s.x+thk/2,         minY:0,maxY:H, minZ:s.z-len/2,maxZ:s.z-len/2+leftLen}
        );
    }

    // Right panel
    const rightLen=(len/2-dc-dw/2);
    if(rightLen>0.05){
        const seg=new THREE.Mesh(
            isZ?new THREE.BoxGeometry(rightLen,H,thk):new THREE.BoxGeometry(thk,H,rightLen),
            mat
        );
        seg.position.set(
            isZ?(len/2-rightLen/2):0,
            H/2,
            isZ?0:(len/2-rightLen/2)
        );
        seg.castShadow=true; seg.receiveShadow=true;
        grp.add(seg);
        colliders.push(isZ?
            {minX:s.x+len/2-rightLen,  maxX:s.x+len/2,         minY:0,maxY:H, minZ:s.z-thk/2,maxZ:s.z+thk/2}:
            {minX:s.x-thk/2,           maxX:s.x+thk/2,         minY:0,maxY:H, minZ:s.z+len/2-rightLen,maxZ:s.z+len/2}
        );
    }

    // Above-door lintel — sits from dh to H, ONLY above the door gap
    const aboveH=H-dh;
    if(aboveH>0.05){
        const seg=new THREE.Mesh(
            isZ?new THREE.BoxGeometry(dw,aboveH,thk):new THREE.BoxGeometry(thk,aboveH,dw),
            mat
        );
        // Y: bottom of lintel = dh, top = H → centre = dh + aboveH/2
        seg.position.set(
            isZ?dc:0,
            dh+aboveH/2,   // ← THIS is the fix: explicit Y, not derived from H/2
            isZ?0:dc
        );
        seg.castShadow=true; seg.receiveShadow=true;
        grp.add(seg);
        // lintel collider (only from dh upward)
        colliders.push(isZ?
            {minX:s.x+dc-dw/2, maxX:s.x+dc+dw/2, minY:dh,maxY:H, minZ:s.z-thk/2,maxZ:s.z+thk/2}:
            {minX:s.x-thk/2,   maxX:s.x+thk/2,   minY:dh,maxY:H, minZ:s.z+dc-dw/2,maxZ:s.z+dc+dw/2}
        );
    }

    // Door frame — gold trim
    const ft=0.18;
    const mkF=(x,y,z,fw,fh,fd)=>{
        const m=new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd),frameMat);
        m.position.set(x,y,z); grp.add(m);
    };
    if(isZ){
        mkF(dc,          dh,          0, dw+ft*2, ft,       thk+0.1); // top bar
        mkF(dc-dw/2-ft/2,dh/2,        0, ft,       dh,       thk+0.1); // left post
        mkF(dc+dw/2+ft/2,dh/2,        0, ft,       dh,       thk+0.1); // right post
    } else {
        mkF(0, dh,           dc,          thk+0.1, ft,       dw+ft*2);
        mkF(0, dh/2, dc-dw/2-ft/2,       thk+0.1, dh,       ft);
        mkF(0, dh/2, dc+dw/2+ft/2,       thk+0.1, dh,       ft);
    }
}

// ── buildPalm ─────────────────────────────────────────────────────────────────
function buildPalm(grp,s,mat){
    // Realistic tapered trunk
    const trunkH=s.h*0.72;
    const trunk=new THREE.Mesh(
        new THREE.CylinderGeometry(0.15,0.3,trunkH,10),
        MAT.trunk
    );
    trunk.position.y=trunkH/2; trunk.castShadow=true; grp.add(trunk);

    // Frond layers
    const isAlpine=s.h>12;
    const frondMat=mat;
    if(isAlpine){
        // Conical pine layers
        [0,2,4,6,8].forEach((yo,i)=>{
            const r=(s.h*0.28)*(1-i*0.16);
            const cone=new THREE.Mesh(
                new THREE.ConeGeometry(r,s.h*0.22,10),
                frondMat
            );
            cone.position.y=trunkH*0.5+yo*(s.h*0.08);
            cone.castShadow=true; grp.add(cone);
        });
    } else {
        // Palm fronds
        [0,1.0,1.8].forEach((yo,i)=>{
            const r=(s.w*1.1)*(1-i*0.2);
            const layer=new THREE.Mesh(
                new THREE.CylinderGeometry(r*0.3,r,0.5+i*0.1,8),
                frondMat
            );
            layer.position.y=trunkH-0.4+yo;
            layer.castShadow=true; grp.add(layer);
        });
    }
}

// ── buildCustom — detailed multi-part objects ─────────────────────────────────
function buildCustom(grp,s,mat){
    const add=(geo,m,x,y,z,rx=0,ry=0,rz=0)=>{
        const mesh=new THREE.Mesh(geo,m||mat);
        mesh.position.set(x,y,z);
        mesh.rotation.set(rx,ry,rz);
        mesh.castShadow=true; mesh.receiveShadow=true;
        grp.add(mesh); return mesh;
    };
    const box=(w,h,d)=>new THREE.BoxGeometry(w,h,d);
    const cyl=(r,h,s=12)=>new THREE.CylinderGeometry(r,r,h,s);

    switch(s.custom){

    case 'reception':
        // Main desk body
        add(box(s.w,s.h,s.d),MAT.walnut,0,s.h/2,0);
        // Marble top
        add(box(s.w+0.1,0.12,s.d+0.1),MAT.marble,0,s.h+0.06,0);
        // Front panel detail
        add(box(s.w-0.4,s.h-0.3,0.08),MAT.oakMid,0,s.h/2-0.15,s.d/2+0.04);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h+0.12,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'sofa':
        // Base
        add(box(s.w,0.6,s.d),mat,0,0.3,0);
        // Back
        add(box(s.w,0.9,0.35),mat,0,0.9,-s.d/2+0.2);
        // Seat cushions (lighter)
        const cushMat=new THREE.MeshStandardMaterial({color:0x2a3558,roughness:0.95});
        [-s.w/4,s.w/4].forEach(ox=>add(box(s.w/2-0.12,0.22,s.d-0.55),cushMat,ox,0.71,0.1));
        // Armrests
        [-s.w/2+0.15,s.w/2-0.15].forEach(ox=>add(box(0.28,0.75,s.d),mat,ox,0.55,0));
        // Legs
        [[-s.w/2+0.3,s.d/2-0.3],[s.w/2-0.3,s.d/2-0.3],[-s.w/2+0.3,-s.d/2+0.3],[s.w/2-0.3,-s.d/2+0.3]]
            .forEach(([lx,lz])=>add(box(0.12,0.22,0.12),MAT.brass,lx,0.11,lz));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:1.4,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'table':
        // Tabletop
        add(box(s.w,0.1,s.d),mat,0,s.h,0);
        // Apron
        add(box(s.w-0.3,0.12,0.08),mat,0,s.h-0.1,s.d/2-0.05);
        add(box(s.w-0.3,0.12,0.08),mat,0,s.h-0.1,-s.d/2+0.05);
        // Legs
        [[s.w/2-0.2,s.d/2-0.2],[-(s.w/2-0.2),s.d/2-0.2],[s.w/2-0.2,-(s.d/2-0.2)],[-(s.w/2-0.2),-(s.d/2-0.2)]]
            .forEach(([lx,lz])=>add(box(0.1,s.h,0.1),mat,lx,s.h/2,lz));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'piano':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        // Lid
        add(box(s.w-0.1,0.06,s.d/2),mat,0,s.h+0.03,-s.d/4);
        // Keys strip
        add(box(s.w-0.6,0.06,0.5),MAT.white,0,s.h+0.03,s.d/2-0.4);
        // Pedals
        [-0.2,0,0.2].forEach(px=>add(box(0.08,0.04,0.25),MAT.chrome,px,0.04,s.d/2+0.1));
        // Legs
        [[-s.w/2+0.2,s.d/2-0.3],[s.w/2-0.2,s.d/2-0.3],[0,-s.d/2+0.3]]
            .forEach(([lx,lz])=>add(cyl(0.08,s.h*0.7),mat,lx,s.h*0.35,lz));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'ceiling':
        // Main ceiling slab
        add(box(s.w,s.h,s.d),MAT.plaster,0,7.5,0);
        // Coffered beams grid
        for(let xi=-2;xi<=2;xi++){
            add(box(0.2,0.25,s.d-2),MAT.plasterWarm,xi*10,7.1,0);
        }
        for(let zi=-2;zi<=2;zi++){
            add(box(s.w-2,0.25,0.2),MAT.plasterWarm,0,7.1,zi*10);
        }
        break;

    case 'chandeliers':
        // 3x3 grid of chandeliers
        [-18,0,18].forEach(cx=>[-18,0,18].forEach(cz=>{
            // Drop rod
            add(cyl(0.04,1.5),MAT.brass,cx,6.5,cz);
            // Main body
            add(cyl(0.6,0.3,16),MAT.brass,cx,5.7,cz);
            // Crystal ring (lighter sphere)
            add(new THREE.SphereGeometry(0.8,16,8),MAT.goldLight,cx,5.5,cz);
            // Arms
            for(let a=0;a<6;a++){
                const angle=a*Math.PI/3;
                add(cyl(0.02,1),MAT.brass,cx+Math.cos(angle)*0.5,5.5,cz+Math.sin(angle)*0.5,0,angle,Math.PI/2);
            }
        }));
        break;

    case 'bedframe':
        // Base
        add(box(s.w,0.3,s.d),mat,0,0.15,0);
        // Headboard
        add(box(s.w,s.h*2.5,0.25),mat,0,s.h*1.25,-s.d/2+0.15);
        // Headboard panel
        add(box(s.w-0.6,s.h*2-0.3,0.1),MAT.cream,0,s.h*1.1,-s.d/2+0.32);
        // Footboard
        add(box(s.w,s.h*0.8,0.2),mat,0,s.h*0.4,s.d/2-0.1);
        // Side rails
        [-s.w/2+0.12,s.w/2-0.12].forEach(ox=>add(box(0.22,0.2,s.d),mat,ox,0.35,0));
        // Legs
        [[-s.w/2+0.2,-s.d/2+0.2],[s.w/2-0.2,-s.d/2+0.2],[-s.w/2+0.2,s.d/2-0.2],[s.w/2-0.2,s.d/2-0.2]]
            .forEach(([lx,lz])=>add(box(0.2,0.35,0.2),mat,lx,0.17,lz));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h*3,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'mattress':
        add(box(s.w,s.h,s.d),MAT.linen,0,0.3+s.h/2,0);
        // Piping detail
        add(box(s.w+0.05,0.06,s.d+0.05),MAT.cream,0,0.3+s.h+0.03,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:1.3+s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'pillows':
        [-3,-1,1,3].forEach(ox=>{
            add(box(1.8,0.55,1.2),MAT.white,ox,2.35+0.27,0);
            // Pillow crease
            add(box(1.6,0.05,0.04),MAT.cream,ox,2.35+0.55,0);
        });
        break;

    case 'nightstand':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        add(box(s.w+0.06,0.06,s.d+0.06),MAT.marble,0,s.h+0.03,0);
        // Drawer
        add(box(s.w-0.3,0.35,0.06),MAT.oakLight,0,s.h/2,s.d/2+0.04);
        add(new THREE.SphereGeometry(0.05,8,8),MAT.brass,0,s.h/2,s.d/2+0.1);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'lamp':
        add(cyl(0.06,s.h*0.65),MAT.brass,0,s.h*0.33,0);
        add(new THREE.SphereGeometry(0.12,8,8),MAT.brass,0,0.1,0);
        // Shade
        add(new THREE.ConeGeometry(0.38,0.45,16,1,true),
            new THREE.MeshStandardMaterial({color:0xf0e8d0,roughness:0.9,side:THREE.DoubleSide}),
            0,s.h*0.78,0);
        colliders.push({minX:s.x-0.4,maxX:s.x+0.4,minY:0,maxY:s.h,minZ:s.z-0.4,maxZ:s.z+0.4});
        break;

    case 'tv':
        // Screen
        add(box(s.w,s.h,0.12),MAT.black,0,s.h/2,0);
        // Screen face (slightly lighter)
        add(box(s.w-0.3,s.h-0.3,0.02),MAT.charcoal,0,s.h/2,0.07);
        // Wall mount bracket
        add(box(1.5,0.3,0.3),MAT.darkMetal,0,s.h/2+0.06,0.2);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-0.2,maxZ:s.z+0.2});
        break;

    case 'armchair':
        add(box(s.w,0.55,s.d),mat,0,0.28,0);
        add(box(s.w,s.h,0.3),mat,0,s.h/2,-s.d/2+0.2);
        [-s.w/2+0.18,s.w/2-0.18].forEach(ox=>add(box(0.3,s.h*0.5,s.d),mat,ox,s.h*0.25,0));
        add(box(s.w-0.6,0.25,s.d-0.5),
            new THREE.MeshStandardMaterial({color:0x343840,roughness:0.97}),0,0.68,0.1);
        [[-s.w/2+0.25,s.d/2-0.25],[s.w/2-0.25,s.d/2-0.25],[-s.w/2+0.25,-s.d/2+0.25],[s.w/2-0.25,-s.d/2+0.25]]
            .forEach(([lx,lz])=>add(box(0.1,0.2,0.1),MAT.darkMetal,lx,0.1,lz));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'desk':
        add(box(s.w,0.08,s.d),mat,0,s.h,0);
        add(box(s.w+0.04,0.04,s.d+0.04),MAT.chrome,0,s.h+0.06,0);
        [[-s.w/2+0.12,s.d/2-0.12],[s.w/2-0.12,s.d/2-0.12]]
            .forEach(([lx,lz])=>add(box(0.15,s.h,0.15),mat,lx,s.h/2,lz));
        add(box(s.w-0.3,s.h,0.15),mat,0,s.h/2,-s.d/2+0.12);
        // Monitor
        add(box(2.2,1.4,0.06),MAT.black,0,s.h+0.8,-s.d/2+0.55);
        add(box(0.2,0.5,0.15),MAT.darkMetal,0,s.h+0.08,-s.d/2+0.52);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'bathtub':
        // Outer shell
        add(box(s.w,s.h,s.d),MAT.white,0,s.h/2,0);
        // Inner cavity (slightly smaller, dark)
        add(box(s.w-0.3,s.h-0.25,s.d-0.3),
            new THREE.MeshStandardMaterial({color:0xe8f4f8,roughness:0.05,metalness:0.05}),
            0,s.h/2+0.12,0);
        // Rim
        add(box(s.w+0.12,0.06,s.d+0.12),MAT.chrome,0,s.h+0.03,0);
        // Feet
        [[-s.w/2+0.3,s.d/2-0.3],[s.w/2-0.3,s.d/2-0.3],[-s.w/2+0.3,-s.d/2+0.3],[s.w/2-0.3,-s.d/2+0.3]]
            .forEach(([lx,lz])=>add(new THREE.SphereGeometry(0.15,8,8),MAT.chrome,lx,0.12,lz));
        // Faucet
        add(cyl(0.04,0.5),MAT.chrome,-s.w/2+0.5,s.h+0.3,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'vanity':
        add(box(s.w,s.h-0.5,s.d),MAT.walnut,0,(s.h-0.5)/2,0);
        add(box(s.w,0.06,s.d),MAT.marble,0,s.h-0.5,0);
        // Sinks
        [-0.7,0.7].forEach(ox=>{
            add(box(0.8,0.08,0.6),MAT.white,ox,s.h-0.44,0);
            add(cyl(0.03,0.25),MAT.chrome,ox,s.h,0);
        });
        // Mirror
        add(box(s.w-0.1,1.8,0.04),MAT.glassClear,0,s.h+1.0,-s.d/2-0.02);
        add(box(s.w+0.06,1.86,0.06),MAT.chrome,0,s.h+1.0,-s.d/2-0.05);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'toilet':
        add(box(s.w,0.45,s.d*0.7),MAT.white,0,0.22,-0.1);
        add(box(s.w-0.1,0.12,s.d),MAT.white,0,0.51,0.08);
        add(box(s.w-0.15,0.4,s.d*0.45),MAT.white,0,0.7,s.d/2-0.15);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:1.1,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'pool':
        // Pool surround
        add(box(s.w,0.5,s.d),MAT.marble,0,0.25,0);
        // Water surface
        add(box(s.w-0.6,0.05,s.d-0.6),MAT.poolBlue,0,0.48,0);
        // Lane lines
        for(let li=-1;li<=1;li++){
            add(box(0.06,0.04,s.d-0.8),MAT.white,li*(s.w/3),0.5,0);
        }
        colliders.push({minX:s.x-s.w/2,maxX:s.x-s.w/2+0.3,minY:0,maxY:0.5,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        colliders.push({minX:s.x+s.w/2-0.3,maxX:s.x+s.w/2,minY:0,maxY:0.5,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'lounger':
        // Frame
        add(box(s.w,0.1,s.d),MAT.oakDk,0,0.3,0);
        // Slats
        for(let i=0;i<8;i++) add(box(s.w-0.1,0.06,0.14),MAT.oakLight,0,0.37,(-s.d/2+0.3)+i*(s.d-0.6)/7);
        // Cushion
        add(box(s.w-0.1,0.15,s.d-0.2),MAT.cream,0,0.45,0);
        // Legs
        [0.9,-0.9].forEach(oz=>[-s.w/2+0.1,s.w/2-0.1].forEach(ox=>add(cyl(0.04,0.28),MAT.brushedSteel,ox,0.14,oz)));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:0.62,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'umbrella':
        // Pole
        add(cyl(0.04,s.h),MAT.brushedSteel,0,s.h/2,0);
        // Canopy ribs
        for(let i=0;i<8;i++){
            const a=i*Math.PI/4;
            const rib=add(box(2.5,0.04,0.08),MAT.cream,Math.cos(a)*1.1,s.h-0.2,Math.sin(a)*1.1);
            rib.rotation.y=a;
        }
        // Canopy fabric (disk)
        add(new THREE.CylinderGeometry(2.4,2.4,0.06,16),MAT.cream,0,s.h-0.15,0);
        colliders.push({minX:s.x-0.2,maxX:s.x+0.2,minY:0,maxY:s.h,minZ:s.z-0.2,maxZ:s.z+0.2});
        break;

    case 'bar':
        // Main bar body
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        // Top
        add(box(s.w+0.15,0.08,s.d+0.15),MAT.marble,0,s.h+0.04,0);
        // Front panel detail
        add(box(s.w-0.4,s.h-0.4,0.08),MAT.oakLight,0,s.h/2-0.1,s.d/2+0.05);
        // Bottle shelf (back)
        add(box(s.w-1,0.06,0.25),MAT.oakMid,0,s.h*0.7,-s.d/2+0.15);
        add(box(s.w-1,0.06,0.25),MAT.oakMid,0,s.h*0.45,-s.d/2+0.15);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h+0.08,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'barstools':
        const stoolW=s.w/Math.round(s.w/1.8);
        const count=Math.round(s.w/1.8);
        for(let i=0;i<count;i++){
            const ox=-s.w/2+stoolW/2+i*stoolW;
            add(cyl(0.04,1.8),MAT.brushedSteel,ox,0.9,0);
            add(new THREE.CylinderGeometry(0.32,0.28,0.14,12),MAT.warmGray,ox,1.86,0);
        }
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:2,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'diningtable':
        // Top
        add(box(s.w,0.1,s.d),mat,0,s.h,0);
        add(box(s.w+0.05,0.04,s.d+0.05),MAT.brass,0,s.h+0.07,0);
        // Pedestal
        add(cyl(0.18,s.h),MAT.walnut,0,s.h/2,0);
        add(box(s.w-1.5,0.12,0.18),MAT.walnut,0,0.1,0);
        add(box(0.18,0.12,s.d-1.5),MAT.walnut,0,0.1,0);
        // Chairs implied by small blocks
        [[0,s.d/2+0.5],[0,-s.d/2-0.5],[s.w/2+0.5,0],[-s.w/2-0.5,0]].forEach(([cx,cz])=>{
            add(box(1.2,0.08,1.2),MAT.linen,cx,s.h-0.08,cz);
            add(box(1.2,1.0,0.12),MAT.charcoalFab,cx,s.h+0.42,cz+(cz>0?-0.54:cz<0?0.54:0));
        });
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'kitchen':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        // Equipment details
        add(box(s.w-0.5,0.06,s.d-0.4),MAT.chrome,0,s.h+0.03,0);
        [-6,-2,2,6].forEach(ox=>add(cyl(0.18,0.08,8),MAT.brushedSteel,ox,s.h+0.07,0));
        [-s.w/2+2,-s.w/2+8].forEach(ox=>add(box(4,s.h*0.5,s.d-0.4),MAT.darkMetal,ox,s.h*0.25,0));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'counter':
        add(box(s.w,0.08,s.d),MAT.marble,0,0.04,0);
        add(box(s.w+0.06,0.04,s.d+0.06),MAT.chrome,0,0.1,0);
        break;

    case 'jacuzzi':
        // Surround
        add(box(s.w,s.h,s.d),MAT.marble,0,s.h/2,0);
        // Water
        add(box(s.w-0.5,0.1,s.d-0.5),MAT.poolBlue,0,s.h-0.05,0);
        // Jets
        for(let a=0;a<6;a++){
            const ang=a*Math.PI/3;
            add(cyl(0.06,0.15),MAT.chrome,(s.w/2-0.35)*Math.cos(ang),s.h*0.7,(s.d/2-0.35)*Math.sin(ang));
        }
        // Steps
        add(box(s.w+1,0.35,0.8),MAT.marbleGray,0,0.17,s.d/2+0.4);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'abutment':
        add(box(s.w,s.h,s.d),MAT.concreteLight,0,s.h/2,0);
        // Bearings
        [-6,6].forEach(ox=>add(box(3,0.4,3),MAT.darkMetal,ox,s.h+0.2,0));
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'pylon':
        // Shaft
        add(box(s.w,s.h,s.d),MAT.concreteLight,0,s.h/2,0);
        // Crosshead
        add(box(s.w+2,1.5,s.d+2),MAT.concreteLight,0,s.h+0.75,0);
        // Cable anchors
        for(let i=0;i<6;i++) add(box(0.2,0.2,0.2),MAT.darkMetal,s.w/2+0.1,s.h-i*5,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h+1.5,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'lamppost':
        add(cyl(0.1,s.h),MAT.darkMetal,0,s.h/2,0);
        add(box(1.2,0.1,0.1),MAT.darkMetal,0.5,s.h-0.1,0);
        add(new THREE.SphereGeometry(0.2,8,8),MAT.goldLight,1.1,s.h-0.05,0);
        colliders.push({minX:s.x-0.15,maxX:s.x+0.15,minY:0,maxY:s.h,minZ:s.z-0.15,maxZ:s.z+0.15});
        break;

    case 'fireplace':
        // Stone surround
        add(box(s.w,s.h,s.d),MAT.concreteLight,0,s.h/2,0);
        // Firebox opening
        add(box(s.w-0.6,s.h*0.45,0.2),MAT.black,0,s.h*0.23,s.d/2+0.11);
        // Mantel shelf
        add(box(s.w+0.4,0.2,s.d+0.3),MAT.oakDk,0,s.h*0.68+0.1,0);
        // Chimney flue
        add(box(s.w-1,s.h*0.35,s.d-1),MAT.concreteLight,0,s.h*0.82,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'skiwall':
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        // Ski pairs
        for(let i=0;i<3;i++) add(box(0.08,s.h-0.8,0.12),MAT.burgundy,(i-1)*2,s.h/2+0.1,s.d/2+0.07);
        // Poles
        for(let i=0;i<4;i++) add(cyl(0.035,s.h-1.2),MAT.brushedSteel,(i-1.5)*1.3,s.h/2,s.d/2+0.1);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
        break;

    case 'arch':
        // Two pillars
        [-s.w/2+0.8,s.w/2-0.8].forEach(ox=>{
            add(box(1.5,s.h,1.5),mat,ox,s.h/2,0);
        });
        // Arch span
        add(box(s.w,1.2,1.5),mat,0,s.h-0.6,0);
        // Hotel name plate
        add(box(s.w-3.5,1.8,0.15),MAT.gold,0,s.h-1.5,0.8);
        // Decorative top
        add(new THREE.SphereGeometry(0.6,12,8),mat,0,s.h+0.6,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x-s.w/2+1.5,minY:0,maxY:s.h,minZ:s.z-0.8,maxZ:s.z+0.8});
        colliders.push({minX:s.x+s.w/2-1.5,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-0.8,maxZ:s.z+0.8});
        break;

    case 'aroof':
        add(box(s.w,0.5,s.d),mat,0,s.h,0);
        // Ridge beam
        add(box(0.4,0.6,s.d),mat,0,s.h+0.55,0);
        // Eave trim
        add(box(s.w+0.6,0.25,0.25),MAT.oakLight,0,s.h+0.1,s.d/2);
        add(box(s.w+0.6,0.25,0.25),MAT.oakLight,0,s.h+0.1,-s.d/2);
        break;

    default:
        add(box(s.w,s.h,s.d),mat,0,s.h/2,0);
        colliders.push({minX:s.x-s.w/2,maxX:s.x+s.w/2,minY:0,maxY:s.h,minZ:s.z-s.d/2,maxZ:s.z+s.d/2});
    }
}

// ── buy / pad ────────────────────────────────────────────────────────────────
function doBuy(s){
    wallet-=s.cost; s.bought=true; income+=s.inc;
    placeObject(s); showToast('✅  '+s.label);
    spawnNextPad(); updateProgress();
}

function spawnNextPad(){
    padList.forEach(p=>scene.remove(p));
    padList.length=0; activePad=null;
    const next=STEPS.find(s=>!s.bought&&(s.need===0||STEPS.find(x=>x.id===s.need)?.bought));
    if(next){
        const parent=STEPS.find(x=>x.id===next.need);
        const padX=parent?parent.x+(next.ox||0):next.x+(next.ox||0);
        const padZ=parent?parent.z+(next.oz||0):next.z+(next.oz||0);
        const padY=(parent?parent.h:0)+PAD_FLOAT;
        const pad=new THREE.Mesh(
            new THREE.CylinderGeometry(2.2,2.2,0.22,32),
            new THREE.MeshBasicMaterial({color:0xffe040,transparent:true,opacity:0.9})
        );
        pad.position.set(padX,padY,padZ);
        pad.stepData=next; scene.add(pad);
        padList.push(pad); activePad=pad;
        document.getElementById('nc-name').textContent=next.label;
        document.getElementById('nc-cost').textContent=next.cost===0?'COMPLIMENTARY':fmtMoney(next.cost);
    } else {
        document.getElementById('nc-name').textContent='GRAND MERIDIAN COMPLETE';
        document.getElementById('nc-cost').textContent='';
        showToast('🎉 The Grand Meridian is open!');
    }
}

setInterval(()=>{if(gameRunning)wallet+=income;},1000);
window.addEventListener('keydown',e=>{if(e.key===' ')e.preventDefault();KEYS[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',e=>{KEYS[e.key.toLowerCase()]=false;});
window.addEventListener('resize',()=>{
    if(!cam||!ren)return;
    cam.aspect=innerWidth/innerHeight;
    cam.updateProjectionMatrix();
    ren.setSize(innerWidth,innerHeight);
});
</script>
