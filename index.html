<!DOCTYPE html>
<html>
<head>
    <title>Ski Resort Tycoon</title>

</head>
<body>
    <div id="loginScreen">
        <h1 style="color: #2980b9;">❄ Ski Resort Tycoon ❄</h1>

        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
